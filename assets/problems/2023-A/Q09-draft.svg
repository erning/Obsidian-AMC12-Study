<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 362" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="sqGradOuter" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.08" />
    </linearGradient>
    <linearGradient id="sqGradInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="362" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="362" />
    <line x1="120" y1="0" x2="120" y2="362" />
    <line x1="200" y1="0" x2="200" y2="362" />
    <line x1="280" y1="0" x2="280" y2="362" />
    <line x1="360" y1="0" x2="360" y2="362" />
    <line x1="440" y1="0" x2="440" y2="362" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -23)">
    <!-- Outer Square (Side 240 px, area 3) -->
    <!-- Top-Left (140, 70), Width/Height 240 px -->
    <rect x="140" y="70" width="240" height="240" fill="url(#sqGradOuter)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Inner Inscribed Square (Side sqrt(2)/sqrt(3) * 240 = 196 px, area 2) -->
    <!-- Vertices at p = 64 px, q = 176 px on outer sides -->
    <!-- (140+64, 70)=(204,70), (380, 70+64)=(380,134), (140+176, 310)=(316,310), (140, 70+176)=(140,246) -->
    <polygon points="204,70 380,134 316,310 140,246" fill="url(#sqGradInner)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Labels for p and q -->
    <line x1="140" y1="55" x2="204" y2="55" stroke="#d97706" stroke-width="1.8" />
    <text x="172" y="48" fill="#b45309" font-size="13" font-weight="bold" text-anchor="middle">p</text>

    <line x1="204" y1="55" x2="380" y2="55" stroke="#0284c7" stroke-width="1.8" />
    <text x="292" y="48" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">q</text>

    <!-- Side lengths -->
    <text x="260" y="200" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">Inner Area = 2</text>
    <text x="395" y="200" fill="#0284c7" font-size="14" font-weight="bold">Outer Area = 3</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">p+q = √3, p²+q² = 2 ➔ p = (√3-1)/2, q = (√3+1)/2 ➔ p/q = 2 - √3</text>
  </g>
</svg>

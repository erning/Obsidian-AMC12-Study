<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 290" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="largeSemiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="circlePGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="520" height="290" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="290" />
    <line x1="120" y1="0" x2="120" y2="290" />
    <line x1="200" y1="0" x2="200" y2="290" />
    <line x1="280" y1="0" x2="280" y2="290" />
    <line x1="360" y1="0" x2="360" y2="290" />
    <line x1="440" y1="0" x2="440" y2="290" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -95)">
    <!-- Base Line (x-axis) -->
    <line x1="140" y1="290" x2="440" y2="290" stroke="#64748b" stroke-width="2" />

    <!-- Large Semicircle: Center (290, 290), Radius 150 -->
    <path d="M 440 290 A 150 150 0 0 0 140 290 Z" fill="url(#largeSemiGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Small Semicircle 1: Center (240, 290), Radius 100 -->
    <path d="M 340 290 A 100 100 0 0 0 140 290 Z" fill="#ffffff" stroke="#0284c7" stroke-width="2" />

    <!-- Small Semicircle 2: Center (390, 290), Radius 50 -->
    <path d="M 440 290 A 50 50 0 0 0 340 290 Z" fill="#ffffff" stroke="#0284c7" stroke-width="2" />

    <!-- Circle P: Center (354.3, 204.3), Radius 42.85 -->
    <circle cx="354.3" cy="204.3" r="42.85" fill="url(#circlePGrad)" stroke="#7c3aed" stroke-width="2" />
    <circle cx="354.3" cy="204.3" r="4.5" fill="#7c3aed" />
    <text x="354.3" y="195" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">P(r)</text>

    <!-- Center markers and labels -->
    <circle cx="290" cy="290" r="4" fill="#0f172a" />
    <circle cx="240" cy="290" r="4" fill="#0f172a" />
    <circle cx="390" cy="290" r="4" fill="#0f172a" />

    <!-- Radius line segments to show tangents (dashed) -->
    <!-- Connection P(30/7, 12/7) to Center1(2, 0) -->
    <line x1="354.3" y1="204.3" x2="240" y2="290" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" />
    <!-- Connection P(30/7, 12/7) to Center2(5, 0) -->
    <line x1="354.3" y1="204.3" x2="390" y2="290" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" />
    <!-- Connection P(30/7, 12/7) to LargeCenter(3, 0) -->
    <line x1="354.3" y1="204.3" x2="290" y2="290" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3,2" />

    <!-- Dimensions labels -->
    <text x="210" y="270" fill="#0284c7" font-size="13" font-weight="bold">R₁ = 2</text>
    <text x="410" y="270" fill="#0284c7" font-size="13" font-weight="bold">R₂ = 1</text>
    <text x="285" y="120" fill="#0284c7" font-size="13" font-weight="bold">R = 3</text>
    <text x="410" y="180" fill="#7c3aed" font-size="13" font-weight="bold">r = 6/7</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">h² = (2+r)² - (1+x)² = (1+r)² - (2-x)² = (3-r)² - x² ➔ r = 6/7</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 364" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="rotGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="364" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="364" />
    <line x1="120" y1="0" x2="120" y2="364" />
    <line x1="200" y1="0" x2="200" y2="364" />
    <line x1="280" y1="0" x2="280" y2="364" />
    <line x1="360" y1="0" x2="360" y2="364" />
    <line x1="440" y1="0" x2="440" y2="364" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -21)">
    <!-- Axes: Origin (100, 310), Scale 12 px/unit -->
    <line x1="40" y1="310" x2="480" y2="310" stroke="#64748b" stroke-width="1.5" />
    <text x="465" y="300" fill="#64748b" font-size="13" font-weight="bold">x</text>

    <line x1="100" y1="340" x2="100" y2="50" stroke="#64748b" stroke-width="1.5" />
    <text x="110" y="65" fill="#64748b" font-size="13" font-weight="bold">y</text>

    <!-- Line l: y = 3/5 x + 8 -> passes through (0, 8)=(100, 214) and (20, 20)=(340, 70) -->
    <!-- Let us draw from x=-5 (40, 238) to x=25 (400, 46) -->
    <line x1="40" y1="238" x2="400" y2="46" stroke="#0284c7" stroke-width="2.5" />
    <text x="410" y="55" fill="#0284c7" font-size="14" font-weight="bold">ℓ: 3x - 5y + 40 = 0</text>

    <!-- Line k: y - 20 = 4(x - 20) -> passes through (15, 0)=(280, 310) and (20, 20)=(340, 70) -->
    <!-- Let us draw from x=14.5 (274, 334) to x=20.5 (346, 46) -->
    <line x1="274" y1="334" x2="346" y2="46" stroke="#7c3aed" stroke-width="2.5" />
    <text x="355" y="55" fill="#7c3aed" font-size="14" font-weight="bold">k (Rotated 45°)</text>

    <!-- Center of Rotation (20, 20) = (340, 70) -->
    <circle cx="340" cy="70" r="5.5" fill="#0f172a" />
    <text x="350" y="75" fill="#0f172a" font-size="14" font-weight="bold">Center(20, 20)</text>

    <!-- X-intercept of k: (15, 0) = (280, 310) -->
    <circle cx="280" cy="310" r="5.5" fill="#e11d48" />
    <text x="280" y="330" fill="#e11d48" font-size="14" font-weight="bold" text-anchor="middle">(15, 0)</text>

    <!-- Rotation Arc (45 deg CCW at Center) -->
    <!-- We draw an arc centered at (340, 70) from angle of l to angle of k -->
    <!-- angle of l is approx arctan(3/5) = 31 deg, angle of k is approx arctan(4) = 76 deg -->
    <!-- radius 50 px -->
    <path d="M 297 96 A 50 50 0 0 1 328 118" fill="none" stroke="#e11d48" stroke-width="2" />
    <text x="325" y="135" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">45° CCW</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">m = 3/5 ➔ Rotated slope = (3/5 + 1) / (1 - 3/5) = 4 ➔ x-intercept = 15</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 350" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="annulusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="350" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="350" />
    <line x1="120" y1="0" x2="120" y2="350" />
    <line x1="200" y1="0" x2="200" y2="350" />
    <line x1="280" y1="0" x2="280" y2="350" />
    <line x1="360" y1="0" x2="360" y2="350" />
    <line x1="440" y1="0" x2="440" y2="350" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -35)">
    <!-- Rhombus Dartboard: Vertices (260, 60), (410, 210), (260, 360), (110, 210) -->
    <!-- Scale: 8 units = 150 px (18.75 px/unit) -->
    <polygon points="260,60 410,210 260,360 110,210" fill="#f8fafc" stroke="#64748b" stroke-width="2.5" />
    <text x="360" y="110" fill="#64748b" font-size="13" font-weight="bold">Dartboard Area = 128</text>

    <!-- Concentric Annulus Target T -->
    <!-- Inner r = sqrt(18) = 4.24 units -> 79.5 px -->
    <!-- Outer R = sqrt(32) = 5.66 units -> 106 px -->
    <path d="M 260 104 A 106 106 0 1 0 260 316 A 106 106 0 1 0 260 104 Z M 260 130.5 A 79.5 79.5 0 1 1 260 289.5 A 79.5 79.5 0 1 1 260 130.5 Z" fill="url(#annulusGrad)" fill-rule="evenodd" stroke="#0284c7" stroke-width="2" />

    <!-- Center O -->
    <circle cx="260" cy="210" r="4" fill="#0f172a" />
    <text x="268" y="215" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Radii Labels -->
    <line x1="260" y1="210" x2="316" y2="154" stroke="#7c3aed" stroke-width="1.8" />
    <text x="280" y="170" fill="#7c3aed" font-size="11" font-weight="bold">r = √18</text>

    <line x1="260" y1="210" x2="335" y2="135" stroke="#0284c7" stroke-width="1.8" />
    <text x="320" y="150" fill="#0284c7" font-size="11" font-weight="bold">R = √32</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Target Area = 14π ➔ Prob = 14π/128 = 7π/64 ➔ m+n = 64+7 = 71</text>
  </g>
</svg>

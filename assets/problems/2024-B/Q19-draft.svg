<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="triGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="triGradB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="340" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="340" />
    <line x1="120" y1="0" x2="120" y2="340" />
    <line x1="200" y1="0" x2="200" y2="340" />
    <line x1="280" y1="0" x2="280" y2="340" />
    <line x1="360" y1="0" x2="360" y2="340" />
    <line x1="440" y1="0" x2="440" y2="340" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -45)">
    <!-- Common Circumcircle Center O = (260, 200), R = 130 px -->
    <circle cx="260" cy="200" r="130" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
    <circle cx="260" cy="200" r="4" fill="#0f172a" />
    <text x="268" y="195" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Triangle ABC (Base 0 deg, 120 deg, 240 deg) -->
    <!-- A: (390, 200), B: (195, 312.5), C: (195, 87.5) -->
    <polygon points="390,200 195,313 195,88" fill="url(#triGradA)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Rotated Triangle DEF by θ = 38 deg -->
    <!-- D: (362, 280), E: (132, 222), F: (286, 73) -->
    <polygon points="362,280 132,222 286,73" fill="url(#triGradB)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Hexagon ADBECF Outer Boundary -->
    <polygon points="390,200 362,280 195,313 132,222 195,88 286,73" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" />

    <!-- Angle theta Arc between A and D at center O -->
    <path d="M 310 200 A 50 50 0 0 1 299 231" fill="none" stroke="#d97706" stroke-width="2" />
    <text x="315" y="222" fill="#b45309" font-size="12" font-weight="bold">θ</text>

    <!-- Vertices Labels -->
    <circle cx="390" cy="200" r="4.5" fill="#0284c7" />
    <text x="402" y="205" fill="#0284c7" font-size="15" font-weight="bold">A</text>

    <circle cx="195" cy="313" r="4.5" fill="#0284c7" />
    <text x="180" y="330" fill="#0284c7" font-size="15" font-weight="bold">B</text>

    <circle cx="195" cy="88" r="4.5" fill="#0284c7" />
    <text x="180" y="80" fill="#0284c7" font-size="15" font-weight="bold">C</text>

    <circle cx="362" cy="280" r="4.5" fill="#7c3aed" />
    <text x="372" y="295" fill="#7c3aed" font-size="15" font-weight="bold">D</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Hexagon Area = 98√3 cos(60°-θ) = 91√3 ➔ tan θ = 5√3 / 11</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="rectGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="innerSqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.03" />
    </linearGradient>
  </defs>
  <rect width="520" height="360" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="360" />
    <line x1="120" y1="0" x2="120" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="280" y1="0" x2="280" y2="360" />
    <line x1="360" y1="0" x2="360" y2="360" />
    <line x1="440" y1="0" x2="440" y2="360" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -25)">
    <!-- Outer Square of side L = 240 -->
    <rect x="140" y="50" width="240" height="240" fill="none" stroke="#64748b" stroke-width="2.5" />

    <!-- Inner Square of side s = 120 -->
    <rect x="200" y="110" width="120" height="120" fill="url(#innerSqGrad)" stroke="#7c3aed" stroke-dasharray="3,2" stroke-width="1.8" />

    <!-- 4 Congruent Rectangles of width x=180, height y=60 -->
    <!-- Top Rectangle -->
    <rect x="140" y="50" width="180" height="60" fill="url(#rectGrad2)" stroke="#0284c7" stroke-width="2" />
    <!-- Right Rectangle -->
    <rect x="320" y="50" width="60" height="180" fill="url(#rectGrad2)" stroke="#0284c7" stroke-width="2" />
    <!-- Bottom Rectangle -->
    <rect x="200" y="230" width="180" height="60" fill="url(#rectGrad2)" stroke="#0284c7" stroke-width="2" />
    <!-- Left Rectangle -->
    <rect x="140" y="110" width="60" height="180" fill="url(#rectGrad2)" stroke="#0284c7" stroke-width="2" />

    <!-- Labels -->
    <text x="230" y="85" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">x</text>
    <text x="350" y="140" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">x</text>
    <text x="290" y="265" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">x</text>
    <text x="170" y="200" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">x</text>

    <!-- Width labels y -->
    <text x="350" y="85" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">y</text>
    <text x="290" y="145" fill="#7c3aed" font-size="13" font-weight="bold" text-anchor="middle">s</text>

    <text x="260" y="315" fill="#64748b" font-size="14" font-weight="bold" text-anchor="middle">Outer Square (Side = L)</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">L = x + y, s = x - y, L² = 4s² ➔ x + y = 2(x - y) ➔ x = 3y ➔ x:y = 3</text>
  </g>
</svg>

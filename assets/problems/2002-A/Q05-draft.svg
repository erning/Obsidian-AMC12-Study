<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 410" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="shadedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.15" />
    </linearGradient>
  </defs>
  <rect width="520" height="410" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="410" />
    <line x1="120" y1="0" x2="120" y2="410" />
    <line x1="200" y1="0" x2="200" y2="410" />
    <line x1="280" y1="0" x2="280" y2="410" />
    <line x1="360" y1="0" x2="360" y2="410" />
    <line x1="440" y1="0" x2="440" y2="410" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 25)">
    <!-- Outer Circle centered at (260, 180), Radius 180 (Shaded area) -->
    <circle cx="260" cy="180" r="180" fill="url(#shadedGrad)" stroke="#b45309" stroke-width="2.5" />

    <!-- Seven masking white circles of Radius 60 -->
    <!-- Center Circle -->
    <circle cx="260" cy="180" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <!-- Outer 6 Circles -->
    <circle cx="380" cy="180" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <circle cx="320" cy="76.1" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <circle cx="200" cy="76.1" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <circle cx="140" cy="180" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <circle cx="200" cy="283.9" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />
    <circle cx="320" cy="283.9" r="60" fill="#ffffff" stroke="#0284c7" stroke-width="2" />

    <!-- Center Points for clarity -->
    <circle cx="260" cy="180" r="3" fill="#0f172a" />
    <circle cx="380" cy="180" r="3" fill="#0f172a" />
    <circle cx="320" cy="76.1" r="3" fill="#0f172a" />

    <!-- Radius Indicator line -->
    <line x1="260" y1="180" x2="380" y2="180" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="320" y="170" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">d = 2</text>

    <line x1="380" y1="180" x2="440" y2="180" stroke="#0284c7" stroke-width="1.5" />
    <text x="410" y="170" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">r = 1</text>

    <!-- Outer Radius Indicator -->
    <line x1="260" y1="180" x2="260" y2="0" stroke="#b45309" stroke-width="1.5" stroke-dasharray="4,2" />
    <text x="270" y="90" fill="#b45309" font-size="13" font-weight="bold">R = 3</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Outer R = 3 ➔ Area(Outer) = 9π, Area(7 Small) = 7π ➔ Shaded = 2π</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 430" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="triGradABC3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="circGradA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="430" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="430" />
    <line x1="120" y1="0" x2="120" y2="430" />
    <line x1="200" y1="0" x2="200" y2="430" />
    <line x1="280" y1="0" x2="280" y2="430" />
    <line x1="360" y1="0" x2="360" y2="430" />
    <line x1="440" y1="0" x2="440" y2="430" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 45)">
    <!-- Equilateral Triangle ABC: A(260, 100), B(380, 307.8), C(140, 307.8) -->
    <polygon points="260,100 380,307.8 140,307.8" fill="url(#triGradABC3)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Circle centered at A, radius 120 -->
    <circle cx="260" cy="100" r="120" fill="url(#circGradA)" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Center Point A -->
    <circle cx="260" cy="100" r="4.5" fill="#0f172a" />
    <text x="260" y="85" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="middle">A</text>

    <!-- Vertices B and C -->
    <circle cx="380" cy="307.8" r="4.5" fill="#0284c7" />
    <text x="390" y="315" fill="#0284c7" font-size="14" font-weight="bold">B</text>

    <circle cx="140" cy="307.8" r="4.5" fill="#0284c7" />
    <text x="130" y="315" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="end">C</text>

    <!-- Labels for regions -->
    <!-- Circular region outside triangle -->
    <text x="260" y="20" fill="#7c3aed" font-size="13" font-weight="bold" text-anchor="middle">Circle Area = 4π</text>
    <!-- Triangle region outside circle -->
    <text x="260" y="270" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">Triangle Area = 4√3</text>
    <text x="260" y="150" fill="#64748b" font-size="12" font-weight="bold" text-anchor="middle">Common Area = z</text>

    <!-- Dimension labels -->
    <text x="340" y="190" fill="#0284c7" font-size="12" font-weight="bold">Side = 4</text>
    <text x="200" y="80" fill="#7c3aed" font-size="12" font-weight="bold">Radius = 2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">(Circle - z) - (Triangle - z) = 4π - 4√3 = 4(π - √3)</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 559" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <radialGradient id="circGrad2005" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </radialGradient>
  </defs>
  <rect width="520" height="559" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="559" />
    <line x1="120" y1="0" x2="120" y2="559" />
    <line x1="200" y1="0" x2="200" y2="559" />
    <line x1="280" y1="0" x2="280" y2="559" />
    <line x1="360" y1="0" x2="360" y2="559" />
    <line x1="440" y1="0" x2="440" y2="559" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 84)">
    <!-- Axes centered at (260, 290) -->
    <line x1="40" y1="290" x2="480" y2="290" stroke="#94a3b8" stroke-width="1.5" />
    <text x="465" y="280" fill="#94a3b8" font-size="13" font-weight="bold">x</text>
    <line x1="260" y1="330" x2="260" y2="20" stroke="#94a3b8" stroke-width="1.5" />
    <text x="270" y="35" fill="#94a3b8" font-size="13" font-weight="bold">y</text>

    <!-- Lines y = x and y = -x -->
    <line x1="60" y1="290" x2="460" y2="290" stroke="#94a3b8" stroke-width="1" />
    <!-- y = x (SVG angle goes up-right) -->
    <line x1="100" y1="450" x2="420" y2="130" stroke="#0284c7" stroke-width="1.5" />
    <text x="400" y="120" fill="#0284c7" font-size="13" font-weight="bold">y = x</text>
    <!-- y = -x -->
    <line x1="100" y1="130" x2="420" y2="450" stroke="#0284c7" stroke-width="1.5" />
    <text x="120" y="120" fill="#0284c7" font-size="13" font-weight="bold">y = -x</text>

    <!-- Line y = 6 (Y = 230) -->
    <line x1="40" y1="230" x2="480" y2="230" stroke="#d97706" stroke-width="2" />
    <text x="440" y="220" fill="#d97706" font-size="13" font-weight="bold">y = 6</text>

    <!-- Circle: center (260, 85.15), radius 144.85 -->
    <circle cx="260" cy="85.15" r="144.85" fill="url(#circGrad2005)" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Center Point (0,k) -->
    <circle cx="260" cy="85.15" r="4.5" fill="#7c3aed" />
    <text x="270" y="80" fill="#7c3aed" font-size="14" font-weight="bold">Center (0,k)</text>

    <!-- Radius Indicator from Center to y=6 -->
    <line x1="260" y1="85.15" x2="260" y2="230" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="270" y="160" fill="#7c3aed" font-size="13" font-weight="bold">Radius r = k - 6</text>

    <!-- Radius Indicator to y=x -->
    <!-- Tangent point on y=x is where line from center is perpendicular:
         Vector from center (0,k) to (x,x) is (x, x-k).
         Perpendicular to (1,1): x + x - k = 0 => 2x = k => x = k/2.
         For k = 20.485, x = 10.24 => SVG coord X = 260 + 102.4 = 362.4, Y = 290 - 102.4 = 187.6.
    -->
    <line x1="260" y1="85.15" x2="362.4" y2="187.6" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="320" y="130" fill="#7c3aed" font-size="13" font-weight="bold">r = k/√2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">r = k - 6 = k / √2 ➔ k = 12 + 6√2 ➔ Radius r = 6 + 6√2</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 325" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="triGradABC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="triGradACD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="325" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="325" />
    <line x1="120" y1="0" x2="120" y2="325" />
    <line x1="200" y1="0" x2="200" y2="325" />
    <line x1="280" y1="0" x2="280" y2="325" />
    <line x1="360" y1="0" x2="360" y2="325" />
    <line x1="440" y1="0" x2="440" y2="325" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -60)">
    <!-- Triangle ABC -->
    <!-- A(140, 260), B(140, 100), C(300, 100) -->
    <polygon points="140,260 140,100 300,100" fill="url(#triGradABC)" stroke="#0284c7" stroke-width="2" />

    <!-- Triangle ACD -->
    <!-- C(300, 100), A(140, 260), D(356.6, 156.6) -->
    <polygon points="140,260 300,100 356.6,156.6" fill="url(#triGradACD)" stroke="#7c3aed" stroke-width="2" />

    <!-- Right angle symbols -->
    <!-- At B -->
    <path d="M 140 115 L 155 115 L 155 100" fill="none" stroke="#0284c7" stroke-width="1.5" />
    <!-- At C for ACD (AC ⊥ CD) -->
    <!-- Vector AC direction: (-160, 160) from C -> normalized (-0.707, 0.707) -->
    <!-- Vector CD direction: (56.6, 56.6) from C -> normalized (0.707, 0.707) -->
    <path d="M 289.4 110.6 L 300 121.2 L 310.6 110.6" fill="none" stroke="#7c3aed" stroke-width="1.5" />

    <!-- Points and Vertices labels -->
    <circle cx="140" cy="260" r="4.5" fill="#0f172a" />
    <text x="125" y="270" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="140" cy="100" r="4.5" fill="#0f172a" />
    <text x="125" y="95" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="300" cy="100" r="4.5" fill="#0f172a" />
    <text x="305" y="90" fill="#0f172a" font-size="14" font-weight="bold">C</text>

    <circle cx="356.6" cy="156.6" r="4.5" fill="#7c3aed" />
    <text x="370" y="165" fill="#7c3aed" font-size="14" font-weight="bold">D</text>

    <!-- Side length labels -->
    <text x="115" y="185" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">1</text>
    <text x="220" y="85" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">1</text>
    <text x="200" y="195" fill="#64748b" font-size="13" font-weight="bold">√2</text>
    <text x="340" y="120" fill="#7c3aed" font-size="13" font-weight="bold">d = 1/2</text>
    <text x="250" y="240" fill="#7c3aed" font-size="13" font-weight="bold">3/2</text>

    <!-- Angle arcs -->
    <path d="M 140 230 A 30 30 0 0 0 161.2 238.8" fill="none" stroke="#0284c7" stroke-width="1.5" />
    <text x="155" y="220" fill="#0284c7" font-size="12" font-weight="bold">45°</text>

    <path d="M 161.2 238.8 A 30 30 0 0 0 167 242.5" fill="none" stroke="#7c3aed" stroke-width="1.5" />
    <text x="178" y="235" fill="#7c3aed" font-size="12" font-weight="bold">θ</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">d + √2+d² = 2 ➔ d = 1/2, AD = 3/2 ➔ sin(2∠BAD) = cos 2θ = 7/9</text>
  </g>
</svg>

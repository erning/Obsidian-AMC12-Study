<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="circGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="460" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="460" />
    <line x1="120" y1="0" x2="120" y2="460" />
    <line x1="200" y1="0" x2="200" y2="460" />
    <line x1="280" y1="0" x2="280" y2="460" />
    <line x1="360" y1="0" x2="360" y2="460" />
    <line x1="440" y1="0" x2="440" y2="460" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 75)">
    <!-- Axes: Origin at (80, 350), scale 25 px/unit -->
    <line x1="40" y1="350" x2="480" y2="350" stroke="#64748b" stroke-width="1.5" />
    <text x="465" y="340" fill="#64748b" font-size="13" font-weight="bold">x (y = 0)</text>

    <!-- Circle (Center (311.25, 31.25), Radius 81.5) -->
    <circle cx="311.25" cy="31.25" r="81.5" fill="url(#circGrad2)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Tangent lines PA and PB -->
    <!-- P(205, 350) -> A(230, 25) -->
    <line x1="205" y1="350" x2="230" y2="25" stroke="#7c3aed" stroke-width="2" />
    <!-- P(205, 350) -> B(380, 75) -->
    <line x1="205" y1="350" x2="380" y2="75" stroke="#7c3aed" stroke-width="2" />

    <!-- Radii OA and OB -->
    <line x1="311.25" y1="31.25" x2="230" y2="25" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2" />
    <line x1="311.25" y1="31.25" x2="380" y2="75" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2" />

    <!-- Points and labels -->
    <circle cx="205" cy="350" r="5" fill="#e11d48" />
    <text x="205" y="335" fill="#e11d48" font-size="14" font-weight="bold" text-anchor="middle">P(5,0)</text>

    <circle cx="230" cy="25" r="4.5" fill="#0f172a" />
    <text x="220" y="18" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="end">A(6,13)</text>

    <circle cx="380" cy="75" r="4.5" fill="#0f172a" />
    <text x="390" y="70" fill="#0f172a" font-size="14" font-weight="bold">B(12,11)</text>

    <circle cx="311.25" cy="31.25" r="4.5" fill="#0f172a" />
    <text x="320" y="25" fill="#0f172a" font-size="14" font-weight="bold">O(9.25, 12.75)</text>

    <!-- Right angle indicators at A and B -->
    <!-- OA direction: (-81.25, -6.25) -> normal: (6.25, -81.25) -->
    <!-- We can just indicate that OA is perpendicular to PA -->

    <text x="270" y="240" fill="#7c3aed" font-size="13" font-weight="bold">PA = PB = √10625/25</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">PA² = PB² ➔ (x-6)²+13² = (x-12)²+11² ➔ x = 5 ➔ R² = 85/8 ➔ Area = 85π/8</text>
  </g>
</svg>

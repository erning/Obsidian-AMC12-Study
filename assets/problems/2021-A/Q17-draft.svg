<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="trapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="360" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="360" />
    <line x1="120" y1="0" x2="120" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="280" y1="0" x2="280" y2="360" />
    <line x1="360" y1="0" x2="360" y2="360" />
    <line x1="440" y1="0" x2="440" y2="360" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -25)">
    <!-- Trapezoid ABCD -->
    <!-- A(333, 290), B(140, 59), C(236.5, 174.5), D(140, 290) -->
    <polygon points="333,290 140,59 236.5,174.5 140,290" fill="url(#trapGrad)" stroke="#0284c7" stroke-width="2" />
    
    <!-- Diagonal BD (140, 290) to (140, 59) -->
    <line x1="140" y1="290" x2="140" y2="59" stroke="#64748b" stroke-width="2" />
    <!-- Diagonal AC (333, 290) to (236.5, 174.5) extended to C -->
    <line x1="333" y1="290" x2="236.5" y2="174.5" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" />

    <!-- Right angle at D (AD ⊥ BD) -->
    <path d="M 140 275 L 155 275 L 155 290" fill="none" stroke="#0f172a" stroke-width="1.5" />

    <!-- CP segment from C(236.5, 174.5) to P(140, 174.5) -->
    <line x1="236.5" y1="174.5" x2="140" y2="174.5" stroke="#7c3aed" stroke-width="1.5" />
    <!-- Right angle at P (CP ⊥ BD) -->
    <path d="M 140 185 L 150 185 L 150 174.5" fill="none" stroke="#7c3aed" stroke-width="1" />

    <!-- Vertices and points -->
    <circle cx="140" cy="290" r="4.5" fill="#0f172a" />
    <text x="120" y="300" fill="#0f172a" font-size="14" font-weight="bold">D</text>

    <circle cx="333" cy="290" r="4.5" fill="#0f172a" />
    <text x="345" y="295" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="140" cy="59" r="4.5" fill="#0f172a" />
    <text x="130" y="50" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="236.5" cy="174.5" r="4.5" fill="#0f172a" />
    <text x="245" y="170" fill="#0f172a" font-size="14" font-weight="bold">C</text>

    <circle cx="140" cy="174.5" r="4" fill="#7c3aed" />
    <text x="120" y="180" fill="#7c3aed" font-size="13" font-weight="bold">P</text>

    <circle cx="140" cy="213" r="4" fill="#e11d48" />
    <text x="120" y="218" fill="#e11d48" font-size="13" font-weight="bold">O</text>

    <!-- Labels for dimensions -->
    <text x="195" y="110" fill="#0284c7" font-size="13" font-weight="bold">BC = 43</text>
    <text x="180" y="235" fill="#0284c7" font-size="13" font-weight="bold">CD = 43</text>
    <text x="160" y="200" fill="#e11d48" font-size="12" font-weight="bold">OP = 11</text>
    <text x="105" y="120" fill="#64748b" font-size="13" font-weight="bold">BD = 66</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">OP = 1/6 BD = 11 ➔ BD = 66, AB = 86 ➔ AD = √86²-66² = 4√190</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="semiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="520" height="280" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="280" />
    <line x1="120" y1="0" x2="120" y2="280" />
    <line x1="200" y1="0" x2="200" y2="280" />
    <line x1="280" y1="0" x2="280" y2="280" />
    <line x1="360" y1="0" x2="360" y2="280" />
    <line x1="440" y1="0" x2="440" y2="280" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -105)">
    <!-- Diameter AB -->
    <line x1="85" y1="290" x2="435" y2="290" stroke="#64748b" stroke-width="2.5" />
    
    <!-- Semicircle Γ -->
    <path d="M 435 290 A 175 175 0 0 0 85 290 Z" fill="url(#semiGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Circle Ω (Center (360, 215), Radius 75) -->
    <circle cx="360" cy="215" r="75" fill="none" stroke="#d97706" stroke-width="2" />

    <!-- Triangle PQR -->
    <!-- P(360, 290), Q(429, 244.5), R(351, 140.5) -->
    <polygon points="360,290 429,244.5 351,140.5" fill="url(#triGrad)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Center O1 and O2 -->
    <circle cx="260" cy="290" r="4.5" fill="#0f172a" />
    <text x="250" y="310" fill="#0f172a" font-size="14" font-weight="bold">O₁</text>

    <circle cx="360" cy="215" r="4.5" fill="#d97706" />
    <text x="365" y="210" fill="#d97706" font-size="14" font-weight="bold">O₂</text>

    <!-- Point P -->
    <circle cx="360" cy="290" r="5" fill="#0f172a" />
    <text x="355" y="310" fill="#0f172a" font-size="14" font-weight="bold">P</text>

    <!-- Q and R labels -->
    <circle cx="429" cy="244.5" r="4.5" fill="#7c3aed" />
    <text x="440" y="250" fill="#7c3aed" font-size="14" font-weight="bold">Q</text>
    <circle cx="351" cy="140.5" r="4.5" fill="#7c3aed" />
    <text x="340" y="130" fill="#7c3aed" font-size="14" font-weight="bold">R</text>

    <!-- Midpoint M of QR -->
    <circle cx="390" cy="192.5" r="3.5" fill="#64748b" />
    <text x="395" y="185" fill="#64748b" font-size="12" font-weight="bold">M</text>

    <!-- Connecting segments O1-O2-P -->
    <line x1="260" y1="290" x2="360" y2="215" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" />
    <line x1="360" y1="215" x2="360" y2="290" stroke="#d97706" stroke-width="2" />
    
    <!-- Right angle symbol at P for tangent -->
    <path d="M 360 275 L 375 275 L 375 290" fill="none" stroke="#d97706" stroke-width="1.5" />

    <!-- Labels for dimensions -->
    <text x="220" y="260" fill="#0284c7" font-size="13" font-weight="bold">Radius = 7</text>
    <text x="370" y="255" fill="#d97706" font-size="13" font-weight="bold">r = 3</text>
    <text x="410" y="195" fill="#7c3aed" font-size="12" font-weight="bold">∠QPR = 60°</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">O₁P = 4, O₁O₂ = 5 ➔ sin ∠PXQ = 4/5 ➔ Area = 21√3 / 5 ➔ 21+3+5 = 29</text>
  </g>
</svg>

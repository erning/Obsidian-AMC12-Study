<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" width="100%" height="100%" style="background-color:#fff;font-family:'Latin Modern Math','Computer Modern','STIX Two Text','Times New Roman',Cambria,serif">
  <rect width="520" height="420" fill="#fff" rx="12"/>
  <!-- Equal scale in both directions: 9 px per coordinate unit. -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <path d="M70 0V420M160 0V420M250 0V420M340 0V420M430 0V420"/>
    <path d="M0 10H520M0 100H520M0 190H520M0 280H520M0 370H520"/>
  </g>
  <!-- Map (x,y) to (70+9x, 370-9y). -->
  <g>
    <path d="M45 370H400M70 395V45" fill="none" stroke="#64748b" stroke-width="1.5"/>
    <text x="388" y="360" fill="#64748b" font-size="12" font-weight="700">x</text>
    <text x="80" y="58" fill="#64748b" font-size="12" font-weight="700">y</text>

    <polygon points="88,91 142,127 232,127" fill="#0284c7" fill-opacity=".12" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round"/>

    <!-- Altitudes: x=2 and y-27=4(x-8). Equal scaling makes them visibly perpendicular to AC. -->
    <line x1="88" y1="45" x2="88" y2="395" stroke="#7c3aed" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="97" y="190" fill="#7c3aed" font-size="12" font-weight="bold">Altitude x = 2</text>
    <line x1="76" y1="391" x2="166" y2="31" stroke="#d97706" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="177" y="235" fill="#b45309" font-size="12" font-weight="bold">slope 4</text>

    <circle cx="88" cy="343" r="6" fill="#e11d48"/>
    <text x="100" y="348" fill="#e11d48" font-size="15" font-weight="800">H(2, 3)</text>

    <g fill="#0284c7" font-size="14" font-weight="800" text-anchor="middle">
      <circle cx="88" cy="91" r="4.5"/><text x="88" y="78">A(2, 31)</text>
      <circle cx="142" cy="127" r="4.5"/><text x="142" y="116">B(8, 27)</text>
      <circle cx="232" cy="127" r="4.5"/><text x="232" y="116">C(18, 27)</text>
    </g>
    <rect x="285" y="325" width="205" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1"/>
    <text x="297" y="350" fill="#15803d" font-size="14" font-weight="800">x + y = 2 + 3 = 5</text>
  </g>
</svg>

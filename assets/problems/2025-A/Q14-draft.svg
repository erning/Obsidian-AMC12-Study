<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="ellipseLargeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="ellipseSmallGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="370" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="370" />
    <line x1="120" y1="0" x2="120" y2="370" />
    <line x1="200" y1="0" x2="200" y2="370" />
    <line x1="280" y1="0" x2="280" y2="370" />
    <line x1="360" y1="0" x2="360" y2="370" />
    <line x1="440" y1="0" x2="440" y2="370" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Ellipses Diagram -->
  <!-- 
       Major Axis along y = 230
       Tangency Point V at (60, 230)
       
       Small Ellipse (foci F, G):
       Center = (130, 230), rx = 70, ry = 25
       Foci: F = (90, 230), G = (170, 230)

       Large Ellipse (foci G, H):
       Center = (260, 230), rx = 200, ry = 70
       Foci: G = (170, 230), H = (350, 230)
  -->
  <g transform="translate(0, -45)">
    <!-- Major Axis Line -->
    <line x1="40" y1="230" x2="480" y2="230" stroke="#64748b" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Large Ellipse -->
    <ellipse cx="260" cy="230" rx="200" ry="75" fill="url(#ellipseLargeGrad)" stroke="#0284c7" stroke-width="2.5" />
    <text x="360" y="140" fill="#0284c7" font-size="14" font-weight="800">Large Ellipse (Area A₁)</text>

    <!-- Small Ellipse -->
    <ellipse cx="130" cy="230" rx="70" ry="30" fill="url(#ellipseSmallGrad)" stroke="#7c3aed" stroke-width="2.5" />
    <text x="100" y="185" fill="#7c3aed" font-size="12" font-weight="bold">Small Ellipse (Area A₂)</text>

    <!-- Foci Points F, G, H -->
    <!-- F -->
    <circle cx="90" cy="230" r="4.5" fill="#7c3aed" />
    <text x="85" y="252" fill="#7c3aed" font-size="14" font-weight="800">F</text>

    <!-- G (Shared Focus) -->
    <circle cx="170" cy="230" r="5.5" fill="#d97706" />
    <text x="165" y="252" fill="#b45309" font-size="15" font-weight="800">G (Shared Focus)</text>

    <!-- H -->
    <circle cx="350" cy="230" r="4.5" fill="#0284c7" />
    <text x="345" y="252" fill="#0284c7" font-size="14" font-weight="800">H</text>

    <!-- Internal Tangency Vertex V -->
    <circle cx="60" cy="230" r="5" fill="#e11d48" />
    <text x="45" y="252" fill="#e11d48" font-size="15" font-weight="800">V</text>
    <text x="40" y="210" fill="#e11d48" font-size="12" font-weight="bold">Tangency</text>

    <!-- Tangency Distance Formula Box -->
    <rect x="70" y="320" width="380" height="75" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" />
    <text x="90" y="345" fill="#0f172a" font-size="13" font-weight="700">📐 Tangency Condition along Focal Axis GV:</text>
    <text x="90" y="368" fill="#b45309" font-size="13" font-weight="bold">GV = a₁ - c₁ = a₂ + c₂ ➔ a₁(1 - e) = a₂(1 + e)</text>
    <text x="90" y="386" fill="#15803d" font-size="13" font-weight="800">a₁/a₂ = 45 ➔ 45(1 - e) = 1 + e ➔ e = 22/23</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="cubeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>

    <linearGradient id="volGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.15" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="440" fill="#ffffff" rx="12" />

  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="440" />
    <line x1="120" y1="0" x2="120" y2="440" />
    <line x1="200" y1="0" x2="200" y2="440" />
    <line x1="280" y1="0" x2="280" y2="440" />
    <line x1="360" y1="0" x2="360" y2="440" />
    <line x1="440" y1="0" x2="440" y2="440" />
    
    <line x1="0" y1="60" x2="520" y2="60" />
    <line x1="0" y1="140" x2="520" y2="140" />
    <line x1="0" y1="220" x2="520" y2="220" />
    <line x1="0" y1="300" x2="520" y2="300" />
    <line x1="0" y1="380" x2="520" y2="380" />
  </g>

  <!-- 3D Unit Cube & Region Diagram -->
  <!-- 
       Unit Cube [0,1]^3 isometric projection:
       Origin O = (160, 310)
       a-axis (depth): (160, 310) to (80, 240)
       b-axis (width): (160, 310) to (360, 310)
       c-axis (height): (160, 310) to (160, 110)
  -->
  <g transform="translate(0, 10)">
    <!-- Unit Cube Wireframe -->
    <polygon points="160,310 360,310 280,240 80,240" fill="url(#cubeGrad)" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
    <polygon points="160,310 360,310 360,110 160,110" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <polygon points="160,110 360,110 280,40 80,40" fill="none" stroke="#94a3b8" stroke-width="1.5" />
    <line x1="80" y1="240" x2="80" y2="40" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="280" y1="240" x2="280" y2="40" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
    <line x1="360" y1="310" x2="280" y2="240" stroke="#94a3b8" stroke-width="1.5" />

    <!-- Axes Labels -->
    <text x="60" y="250" fill="#0284c7" font-size="13" font-weight="bold">a-axis</text>
    <text x="375" y="315" fill="#0284c7" font-size="13" font-weight="bold">b-axis</text>
    <text x="160" y="30" fill="#0284c7" font-size="13" font-weight="bold">c-axis</text>

    <!-- Highlighted Region for a > 2b (b in [0, 1/2]) -->
    <!-- Midpoint of b-axis b=1/2 at (260, 310) -->
    <!-- Cut plane a = 2b -->
    <polygon points="160,310 260,310 220,240 80,240" fill="url(#volGrad)" stroke="#16a34a" stroke-width="2" />
    <text x="180" y="270" fill="#15803d" font-size="13" font-weight="800">Valid Sub-Volume (b &lt; 1/2)</text>

    <!-- Symmetry Factor Callout -->
    <rect x="290" y="140" width="200" height="75" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" />
    <text x="305" y="165" fill="#0f172a" font-size="12" font-weight="700">Order Symmetry (3! = 6):</text>
    <text x="305" y="185" fill="#7c3aed" font-size="12" font-weight="bold">6 Orderings of {a, b, c}</text>
    <text x="305" y="202" fill="#0284c7" font-size="11">Only need 1 ordered wedge!</text>

    <!-- Integration Formula Box -->
    <rect x="50" y="350" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="375" fill="#15803d" font-size="14" font-weight="800">Pr(a &gt; 2b) = 6 ∫₀¹/² b(1 - 2b) db = 6 (1/8 - 1/12) = 1/4</text>
  </g>
</svg>

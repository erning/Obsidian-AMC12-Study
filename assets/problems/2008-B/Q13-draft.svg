<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 365" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="sqGrad2008" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="stripGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#d97706" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="365" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="365" />
    <line x1="120" y1="0" x2="120" y2="365" />
    <line x1="200" y1="0" x2="200" y2="365" />
    <line x1="280" y1="0" x2="280" y2="365" />
    <line x1="360" y1="0" x2="360" y2="365" />
    <line x1="440" y1="0" x2="440" y2="365" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -20)">
    <!-- Unit Square ABCD: A(140, 290), B(380, 290), C(380, 50), D(140, 50) -->
    <rect x="140" y="50" width="240" height="240" fill="url(#sqGrad2008)" stroke="#64748b" stroke-width="2.5" />

    <!-- Equilateral Triangle ABE: A(140, 290), B(380, 290), E(260, 82.2) -->
    <polygon points="140,290 380,290 260,82.2" fill="none" stroke="#0284c7" stroke-width="2" />

    <!-- Shaded Region R: The strip 220 to 300, outside ABE, inside ABCD -->
    <!-- Formed by two polygons:
         Left: (220, 50) to (260, 50) to (260, 82.2) to (220, 151.4)
         Right: (260, 50) to (300, 50) to (300, 151.4) to (260, 82.2)
         We can merge them into one polygon:
         (220, 50) to (300, 50) to (300, 151.4) to (260, 82.2) to (220, 151.4)
    -->
    <polygon points="220,50 300,50 300,151.4 260,82.2 220,151.4" fill="url(#stripGrad)" stroke="#d97706" stroke-width="1.8" />

    <!-- Vertical boundary lines for x = 1/3 (220) and x = 2/3 (300) -->
    <line x1="220" y1="50" x2="220" y2="290" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,3" />
    <line x1="300" y1="50" x2="300" y2="290" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Vertices labels -->
    <circle cx="140" cy="290" r="4.5" fill="#0f172a" />
    <text x="130" y="305" fill="#0f172a" font-size="14" font-weight="bold">A(0,0)</text>

    <circle cx="380" cy="290" r="4.5" fill="#0f172a" />
    <text x="390" y="305" fill="#0f172a" font-size="14" font-weight="bold">B(1,0)</text>

    <circle cx="380" cy="50" r="4.5" fill="#0f172a" />
    <text x="390" y="45" fill="#0f172a" font-size="14" font-weight="bold">C(1,1)</text>

    <circle cx="140" cy="50" r="4.5" fill="#0f172a" />
    <text x="130" y="45" fill="#0f172a" font-size="14" font-weight="bold">D(0,1)</text>

    <circle cx="260" cy="82.2" r="4.5" fill="#0284c7" />
    <text x="260" y="70" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">E</text>

    <!-- Strip markers -->
    <text x="220" y="310" fill="#d97706" font-size="12" font-weight="bold" text-anchor="middle">x = 1/3</text>
    <text x="300" y="310" fill="#d97706" font-size="12" font-weight="bold" text-anchor="middle">x = 2/3</text>

    <!-- Region R Label -->
    <text x="260" y="115" fill="#d97706" font-size="14" font-weight="bold" text-anchor="middle">R</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Area(R) = Strip Area - Triangle Area in Strip = 1/3 - 5√3/36 = (12-5√3)/36</text>
  </g>
</svg>

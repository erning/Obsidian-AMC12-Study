<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <!-- Background -->
  <rect width="520" height="360" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="360" />
    <line x1="120" y1="0" x2="120" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="280" y1="0" x2="280" y2="360" />
    <line x1="360" y1="0" x2="360" y2="360" />
    <line x1="440" y1="0" x2="440" y2="360" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -25)">
    <!-- Axes: Origin (160, 260), Scale 30 px/unit -->
    <line x1="40" y1="260" x2="460" y2="260" stroke="#64748b" stroke-width="1.5" />
    <text x="445" y="250" fill="#64748b" font-size="13" font-weight="bold">x</text>

    <line x1="160" y1="340" x2="160" y2="50" stroke="#64748b" stroke-width="1.5" />
    <text x="170" y="65" fill="#64748b" font-size="13" font-weight="bold">y</text>

    <!-- Center C(3,1) = (160 + 90, 260 - 30) = (250, 230) -->
    <circle cx="250" cy="230" r="5" fill="#0f172a" />
    <text x="260" y="235" fill="#0f172a" font-size="14" font-weight="bold">C(3, 1)</text>

    <!-- Original Point A(-1, -2) = (160 - 30, 260 + 60) = (130, 320) -->
    <circle cx="130" cy="320" r="5.5" fill="#0284c7" />
    <text x="75" y="325" fill="#0284c7" font-size="14" font-weight="bold">A(-1, -2)</text>

    <!-- Relative vector v = (-4, -3). Length R = 5 units = 150 px -->
    <line x1="250" y1="230" x2="130" y2="320" stroke="#0284c7" stroke-width="2" stroke-dasharray="4,3" />

    <!-- Rotated Point A' (0, 5) = (160, 260 - 150) = (160, 110) -->
    <!-- Relative vector v' = (-3, 4) -->
    <circle cx="160" cy="110" r="5.5" fill="#e11d48" />
    <text x="172" y="115" fill="#e11d48" font-size="15" font-weight="bold">A'(0, 5)</text>
    <line x1="250" y1="230" x2="160" y2="110" stroke="#e11d48" stroke-width="2" stroke-dasharray="4,3" />

    <!-- Rotation Arc 270 deg counterclockwise (or 90 deg clockwise) -->
    <path d="M 130 320 A 150 150 0 1 1 160 110" fill="none" stroke="#7c3aed" stroke-width="2.5" />
    <text x="320" y="230" fill="#7c3aed" font-size="13" font-weight="bold">270° CCW Rotation</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">v = (-4, -3) ➔ 270° CCW: (-3, 4) ➔ New Pos = (3,1) + (-3,4) = (0, 5)</text>
  </g>
</svg>

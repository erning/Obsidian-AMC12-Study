<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 380" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="concGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="380" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="380" />
    <line x1="120" y1="0" x2="120" y2="380" />
    <line x1="200" y1="0" x2="200" y2="380" />
    <line x1="280" y1="0" x2="280" y2="380" />
    <line x1="360" y1="0" x2="360" y2="380" />
    <line x1="440" y1="0" x2="440" y2="380" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -15)">
    <!-- Axes: Origin (220, 200), Scale 20 px/unit -->
    <line x1="40" y1="200" x2="480" y2="200" stroke="#64748b" stroke-width="1.5" />
    <text x="465" y="190" fill="#64748b" font-size="13" font-weight="bold">x</text>

    <line x1="220" y1="340" x2="220" y2="50" stroke="#64748b" stroke-width="1.5" />
    <text x="230" y="65" fill="#64748b" font-size="13" font-weight="bold">y</text>

    <!-- Concentric Circle 1 (r=2 -> 40 px) -->
    <circle cx="220" cy="200" r="40" fill="none" stroke="#0284c7" stroke-width="2" />
    <text x="210" y="195" fill="#0284c7" font-size="11" font-weight="bold">r=2</text>

    <!-- Concentric Circle 2 (r=8 -> 160 px) -->
    <circle cx="220" cy="200" r="160" fill="url(#concGrad)" stroke="#0284c7" stroke-width="2.5" />
    <text x="350" y="190" fill="#0284c7" font-size="12" font-weight="bold">r=8</text>

    <!-- Third Circle C3: Center (5,0) = (320, 200), Radius sqrt(3) -> 34.6 px -->
    <circle cx="320" cy="200" r="35" fill="none" stroke="#d97706" stroke-width="2" stroke-dasharray="4,3" />
    <circle cx="320" cy="200" r="3.5" fill="#d97706" />
    <text x="325" y="215" fill="#b45309" font-size="12" font-weight="bold">C₃(5,0)</text>

    <!-- Candidate Tangent Circle 1: Radius 3 (60 px), Center at R=5 -> (320, 200 - 60) = (320, 140) -->
    <circle cx="320" cy="140" r="60" fill="none" stroke="#7c3aed" stroke-width="2" />
    <text x="325" y="130" fill="#7c3aed" font-size="12" font-weight="bold">r=3 (4 Circles)</text>

    <!-- Candidate Tangent Circle 2: Radius 5 (100 px), Center at R=3 -> (280, 200 + 70) = (280, 270) -->
    <circle cx="280" cy="270" r="100" fill="none" stroke="#e11d48" stroke-width="2" />
    <text x="285" y="280" fill="#e11d48" font-size="12" font-weight="bold">r=5 (4 Circles)</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">4 Circles of r=3 + 4 Circles of r=5 ➔ Total Area = 4π(9) + 4π(25) = 136π</text>
  </g>
</svg>

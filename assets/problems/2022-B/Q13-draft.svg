<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 390" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="rectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="overlapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="390" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="390" />
    <line x1="120" y1="0" x2="120" y2="390" />
    <line x1="200" y1="0" x2="200" y2="390" />
    <line x1="280" y1="0" x2="280" y2="390" />
    <line x1="360" y1="0" x2="360" y2="390" />
    <line x1="440" y1="0" x2="440" y2="390" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, 5)">
    <!-- Rectangle 4x8: Coordinates (100, 310) to (420, 150) -> Scale 40 px/unit -->
    <rect x="100" y="150" width="320" height="160" fill="url(#rectGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Tilted Square Vertices:
         (4,0) -> (260, 310)
         (0,3) -> (100, 190)
         (3,7) -> (220, 30)
         (7,4) -> (380, 150)
    -->
    <polygon points="260,310 100,190 220,30 380,150" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Overlapping Shaded Polygon:
         Vertices: (260, 310), (100, 190), (130, 150), (380, 150)
    -->
    <polygon points="260,310 100,190 130,150 380,150" fill="url(#overlapGrad)" stroke="#7c3aed" stroke-width="2" />

    <!-- Outside Triangle above y=4: (130, 150), (220, 30), (380, 150) -->
    <polygon points="130,150 220,30 380,150" fill="#fee2e2" fill-opacity="0.6" stroke="#e11d48" stroke-width="2" stroke-dasharray="4,3" />

    <!-- Vertices Labels -->
    <circle cx="260" cy="310" r="4.5" fill="#7c3aed" />
    <text x="260" y="330" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">(4,0)</text>

    <circle cx="100" cy="190" r="4.5" fill="#7c3aed" />
    <text x="80" y="195" fill="#7c3aed" font-size="14" font-weight="bold">(0,3)</text>

    <circle cx="220" cy="30" r="4.5" fill="#e11d48" />
    <text x="220" y="20" fill="#e11d48" font-size="14" font-weight="bold" text-anchor="middle">(3,7)</text>

    <circle cx="380" cy="150" r="4.5" fill="#7c3aed" />
    <text x="390" y="150" fill="#7c3aed" font-size="14" font-weight="bold">(7,4)</text>

    <!-- Labels -->
    <text x="240" y="220" fill="#7c3aed" font-size="15" font-weight="bold" text-anchor="middle">Overlap Area = 125/8</text>
    <text x="245" y="100" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">Outside Area = 75/8</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Square Area = 25, Outside Area = 75/8 ➔ Overlap Area = 25 - 75/8 = 125/8</text>
  </g>
</svg>

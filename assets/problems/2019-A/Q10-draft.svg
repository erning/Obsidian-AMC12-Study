<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="largeCircGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="370" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="370" />
    <line x1="120" y1="0" x2="120" y2="370" />
    <line x1="200" y1="0" x2="200" y2="370" />
    <line x1="280" y1="0" x2="280" y2="370" />
    <line x1="360" y1="0" x2="360" y2="370" />
    <line x1="440" y1="0" x2="440" y2="370" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -15)">
    <!-- Large Circle (Center (260, 200), Radius 156.2) -->
    <circle cx="260" cy="200" r="156.2" fill="url(#largeCircGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Center circle (Center (260, 200), Radius 35) -->
    <circle cx="260" cy="200" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    
    <!-- 6 inner rings -->
    <circle cx="330" cy="200" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="295" cy="139.4" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="225" cy="139.4" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="190" cy="200" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="225" cy="260.6" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="295" cy="260.6" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />

    <!-- 6 outer rings -->
    <circle cx="365" cy="139.4" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="260" cy="78.8" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="155" cy="139.4" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="155" cy="260.6" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="260" cy="321.2" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />
    <circle cx="365" cy="260.6" r="35" fill="#f8fafc" stroke="#64748b" stroke-width="1.5" />

    <!-- Dimensions line from center to outer tangent -->
    <line x1="260" y1="200" x2="260" y2="43.8" stroke="#e11d48" stroke-width="2" />
    <circle cx="260" cy="200" r="4.5" fill="#0f172a" />
    <circle cx="260" cy="43.8" r="3.5" fill="#e11d48" />

    <!-- Dimension labels -->
    <text x="250" y="130" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="end">Radius = 2√3 + 1</text>
    <text x="270" y="295" fill="#64748b" font-size="12" font-weight="bold">r = 1</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Large R = 2√3 + 1 ➔ Area = π(2√3 + 1)² - 13π = 4π√3</text>
  </g>
</svg>

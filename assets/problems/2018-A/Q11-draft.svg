<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 365" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="triGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="365" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="365" />
    <line x1="120" y1="0" x2="120" y2="365" />
    <line x1="200" y1="0" x2="200" y2="365" />
    <line x1="280" y1="0" x2="280" y2="365" />
    <line x1="360" y1="0" x2="360" y2="365" />
    <line x1="440" y1="0" x2="440" y2="365" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -20)">
    <!-- Triangle ABC: C(140, 290), B(320, 290), A(140, 50) -->
    <polygon points="140,50 320,290 140,290" fill="url(#triGrad3)" stroke="#0284c7" stroke-width="2" />

    <!-- Crease line DE: D(230, 170) to E(140, 102.5) -->
    <line x1="230" y1="170" x2="140" y2="102.5" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Right angle at C -->
    <path d="M 140 275 L 155 275 L 155 290" fill="none" stroke="#0284c7" stroke-width="1.5" />

    <!-- Right angle at D (Crease ⊥ AB) -->
    <!-- AB vector: (180, 240) -> normal (240, -180) -->
    <path d="M 239 158 L 251 167 L 242 179" fill="none" stroke="#7c3aed" stroke-width="1.5" />

    <!-- Points and labels -->
    <circle cx="140" cy="50" r="4.5" fill="#0f172a" />
    <text x="125" y="45" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="320" cy="290" r="4.5" fill="#0f172a" />
    <text x="330" y="295" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="140" cy="290" r="4.5" fill="#0f172a" />
    <text x="125" y="300" fill="#0f172a" font-size="14" font-weight="bold">C</text>

    <circle cx="230" cy="170" r="4.5" fill="#7c3aed" />
    <text x="240" y="165" fill="#7c3aed" font-size="13" font-weight="bold">D</text>

    <circle cx="140" cy="102.5" r="4.5" fill="#7c3aed" />
    <text x="125" y="105" fill="#7c3aed" font-size="13" font-weight="bold">E</text>

    <!-- Side length labels -->
    <text x="120" y="170" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">4</text>
    <text x="230" y="310" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">3</text>
    <text x="250" y="145" fill="#64748b" font-size="13" font-weight="bold">5</text>
    <text x="200" y="125" fill="#7c3aed" font-size="13" font-weight="bold">Crease = 15/8</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">DE ⊥ AB, AD = 5/2 ➔ ΔADE ~ ΔACB ➔ DE / AD = CB / CA ➔ DE = 15/8</text>
  </g>
</svg>

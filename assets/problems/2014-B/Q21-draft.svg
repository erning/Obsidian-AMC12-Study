<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 365" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="sqGrad2014" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="rectGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="365" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="365" />
    <line x1="120" y1="0" x2="120" y2="365" />
    <line x1="200" y1="0" x2="200" y2="365" />
    <line x1="280" y1="0" x2="280" y2="365" />
    <line x1="360" y1="0" x2="360" y2="365" />
    <line x1="440" y1="0" x2="440" y2="365" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -20)">
    <!-- Square ABCD -->
    <!-- A(140, 50), B(140, 290), C(380, 290), D(380, 50) -->
    <rect x="140" y="50" width="240" height="240" fill="url(#sqGrad2014)" stroke="#64748b" stroke-width="2.5" />

    <!-- Rectangle EBCF: B(140, 290), C(380, 290), F(380, 225.7), E(140, 225.7) -->
    <rect x="140" y="225.7" width="240" height="64.3" fill="url(#rectGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Rectangle JKHG: J(140, 170), K(172.1, 225.7), H(380, 105.7), G(347.9, 50) -->
    <polygon points="140,170 172.1,225.7 380,105.7 347.9,50" fill="url(#rectGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Vertices labels -->
    <text x="130" y="45" fill="#64748b" font-size="14" font-weight="bold">A</text>
    <text x="130" y="305" fill="#64748b" font-size="14" font-weight="bold">B</text>
    <text x="390" y="305" fill="#64748b" font-size="14" font-weight="bold">C</text>
    <text x="390" y="45" fill="#64748b" font-size="14" font-weight="bold">D</text>

    <!-- Other labels -->
    <text x="125" y="230" fill="#0284c7" font-size="13" font-weight="bold">E</text>
    <text x="390" y="230" fill="#0284c7" font-size="13" font-weight="bold">F</text>
    <text x="130" y="175" fill="#0284c7" font-size="13" font-weight="bold">J</text>
    <text x="175" y="220" fill="#0284c7" font-size="13" font-weight="bold">K</text>
    <text x="390" y="115" fill="#0284c7" font-size="13" font-weight="bold">H</text>
    <text x="340" y="45" fill="#0284c7" font-size="13" font-weight="bold">G</text>

    <!-- Angle indicator at G -->
    <path d="M 362.9 50 A 15 15 0 0 1 352.9 62.5" fill="none" stroke="#7c3aed" stroke-width="1.5" />
    <text x="365" y="70" fill="#7c3aed" font-size="11" font-weight="bold">θ = 30°</text>

    <!-- Dimensions -->
    <text x="110" y="260" fill="#e11d48" font-size="13" font-weight="bold">x</text>
    <text x="260" y="215" fill="#64748b" font-size="12" font-weight="bold" text-anchor="middle">Side = 1</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">x = sin θ / (1-cos θ), 1 = x + sin θ + x cos θ ➔ θ = 30° ➔ x = 2 - √3</text>
  </g>
</svg>

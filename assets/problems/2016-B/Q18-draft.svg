<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <radialGradient id="flowerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </radialGradient>
  </defs>
  <rect width="520" height="340" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="340" />
    <line x1="120" y1="0" x2="120" y2="340" />
    <line x1="200" y1="0" x2="200" y2="340" />
    <line x1="280" y1="0" x2="280" y2="340" />
    <line x1="360" y1="0" x2="360" y2="340" />
    <line x1="440" y1="0" x2="440" y2="340" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -45)">
    <!-- Axes centered at (260, 200), Scale 100 px/unit -->
    <line x1="40" y1="200" x2="480" y2="200" stroke="#94a3b8" stroke-width="1.5" />
    <text x="465" y="190" fill="#94a3b8" font-size="13" font-weight="bold">x</text>

    <line x1="260" y1="330" x2="260" y2="70" stroke="#94a3b8" stroke-width="1.5" />
    <text x="270" y="85" fill="#94a3b8" font-size="13" font-weight="bold">y</text>

    <!-- Four circles forming the flower shape -->
    <!-- Q1: Center (310, 150), Radius 70.7 -->
    <circle cx="310" cy="150" r="70.7" fill="url(#flowerGrad)" stroke="#7c3aed" stroke-width="2" />
    <!-- Q2: Center (210, 150), Radius 70.7 -->
    <circle cx="210" cy="150" r="70.7" fill="url(#flowerGrad)" stroke="#7c3aed" stroke-width="2" />
    <!-- Q3: Center (210, 250), Radius 70.7 -->
    <circle cx="210" cy="250" r="70.7" fill="url(#flowerGrad)" stroke="#7c3aed" stroke-width="2" />
    <!-- Q4: Center (310, 250), Radius 70.7 -->
    <circle cx="310" cy="250" r="70.7" fill="url(#flowerGrad)" stroke="#7c3aed" stroke-width="2" />

    <!-- Center Points & Labels -->
    <circle cx="260" cy="200" r="4.5" fill="#0f172a" />
    <text x="250" y="215" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Quadrant labels and equations -->
    <text x="345" y="130" fill="#7c3aed" font-size="12" font-weight="bold">x²+y² = x+y</text>
    <text x="175" y="130" fill="#7c3aed" font-size="12" font-weight="bold" text-anchor="end">x²+y² = -x+y</text>
    <text x="175" y="275" fill="#7c3aed" font-size="12" font-weight="bold" text-anchor="end">x²+y² = -x-y</text>
    <text x="345" y="275" fill="#7c3aed" font-size="12" font-weight="bold">x²+y² = x-y</text>

    <!-- Axis Intercept Markers -->
    <circle cx="360" cy="200" r="3.5" fill="#0f172a" />
    <text x="365" y="215" fill="#0f172a" font-size="12" font-weight="bold">1</text>

    <circle cx="160" cy="200" r="3.5" fill="#0f172a" />
    <text x="150" y="215" fill="#0f172a" font-size="12" font-weight="bold">-1</text>

    <circle cx="260" cy="100" r="3.5" fill="#0f172a" />
    <text x="270" y="105" fill="#0f172a" font-size="12" font-weight="bold">1</text>

    <circle cx="260" cy="300" r="3.5" fill="#0f172a" />
    <text x="270" y="305" fill="#0f172a" font-size="12" font-weight="bold">-1</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Area of each leaf = 1/2 + π/4 ➔ Total Area = 4(1/2 + π/4) = π + 2</text>
  </g>
</svg>

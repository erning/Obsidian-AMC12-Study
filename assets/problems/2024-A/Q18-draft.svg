<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 355" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="355" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="355" />
    <line x1="120" y1="0" x2="120" y2="355" />
    <line x1="200" y1="0" x2="200" y2="355" />
    <line x1="280" y1="0" x2="280" y2="355" />
    <line x1="360" y1="0" x2="360" y2="355" />
    <line x1="440" y1="0" x2="440" y2="355" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -30)">
    <!-- Circumcircle O = (260, 190), R = 130 -->
    <circle cx="260" cy="190" r="130" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />
    <circle cx="260" cy="190" r="4" fill="#0f172a" />
    <text x="268" y="185" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Card 1 (Base Rectangle) -->
    <!-- Diagonal from (135, 224) to (385, 156) -->
    <line x1="135" y1="224" x2="385" y2="156" stroke="#d97706" stroke-width="2.5" />
    <polygon points="135,224 375,288 385,156 145,92" fill="url(#cardGrad)" stroke="#0284c7" stroke-width="2" />
    <text x="260" y="270" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">Card 1: 1 × (2 + √3)</text>
    
    <!-- Angle 15 deg -->
    <path d="M 300 190 A 40 40 0 0 1 298 179" fill="none" stroke="#d97706" stroke-width="1.8" />
    <text x="308" y="186" fill="#b45309" font-size="11" font-weight="bold">15°</text>

    <!-- Target Vertex B at 90 deg rotation -> (225, 60) -->
    <circle cx="225" cy="60" r="5" fill="#e11d48" />
    <text x="205" y="55" fill="#e11d48" font-size="15" font-weight="bold">B (90°)</text>

    <!-- Rotated Card Ray to 90 deg -->
    <line x1="260" y1="190" x2="225" y2="60" stroke="#e11d48" stroke-width="2" stroke-dasharray="4,3" />

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">tan θ = 1/(2+√3) = tan 15° ➔ Rotation per card = 15° ➔ 90°/15° = 6 Cards</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 345" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="quadGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="345" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="345" />
    <line x1="120" y1="0" x2="120" y2="345" />
    <line x1="200" y1="0" x2="200" y2="345" />
    <line x1="280" y1="0" x2="280" y2="345" />
    <line x1="360" y1="0" x2="360" y2="345" />
    <line x1="440" y1="0" x2="440" y2="345" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -40)">
    <!-- Circumcircle O = (260, 200), R = 135 px -->
    <circle cx="260" cy="200" r="135" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,4" />

    <!-- Vertices:
         A = (135, 150)
         B = (220, 332)
         C = (380, 260)
         D = (345, 95)
    -->
    <!-- Polygon ABCD -->
    <polygon points="135,150 220,332 380,260 345,95" fill="url(#quadGrad)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Diagonal AC = 7 -->
    <line x1="135" y1="150" x2="380" y2="260" stroke="#7c3aed" stroke-width="2.5" />
    <text x="240" y="195" fill="#7c3aed" font-size="14" font-weight="bold">AC = 7</text>

    <!-- Shorter Diagonal BD = 39/7 -->
    <line x1="220" y1="332" x2="345" y2="95" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="6,3" />
    <text x="295" y="210" fill="#e11d48" font-size="14" font-weight="bold">BD = 39/7</text>

    <!-- Angles -->
    <!-- Angle D = 120 deg -->
    <path d="M 322 105 A 25 25 0 0 0 340 120" fill="none" stroke="#d97706" stroke-width="2" />
    <text x="315" y="130" fill="#b45309" font-size="12" font-weight="bold">120°</text>

    <!-- Angle B = 60 deg -->
    <path d="M 233 312 A 25 25 0 0 0 210 310" fill="none" stroke="#d97706" stroke-width="2" />
    <text x="220" y="300" fill="#b45309" font-size="12" font-weight="bold">60°</text>

    <!-- Side lengths -->
    <text x="230" y="110" fill="#0f172a" font-size="13" font-weight="bold">DA = 5</text>
    <text x="375" y="180" fill="#0f172a" font-size="13" font-weight="bold">CD = 3</text>
    <text x="310" y="315" fill="#0f172a" font-size="13" font-weight="bold">BC = 3</text>
    <text x="155" y="260" fill="#0f172a" font-size="13" font-weight="bold">AB = 8</text>

    <!-- Vertices Labels -->
    <circle cx="135" cy="150" r="4.5" fill="#0f172a" />
    <text x="118" y="155" fill="#0f172a" font-size="15" font-weight="bold">A</text>

    <circle cx="220" cy="332" r="4.5" fill="#0f172a" />
    <text x="210" y="352" fill="#0f172a" font-size="15" font-weight="bold">B</text>

    <circle cx="380" cy="260" r="4.5" fill="#0f172a" />
    <text x="392" y="270" fill="#0f172a" font-size="15" font-weight="bold">C</text>

    <circle cx="345" cy="95" r="4.5" fill="#0f172a" />
    <text x="352" y="85" fill="#0f172a" font-size="15" font-weight="bold">D</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Ptolemy: AC·BD = AB·CD + AD·BC ➔ 7 BD = 24 + 15 ➔ BD = 39/7</text>
  </g>
</svg>

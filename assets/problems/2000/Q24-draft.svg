<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="smallCircleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="370" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="370" />
    <line x1="120" y1="0" x2="120" y2="370" />
    <line x1="200" y1="0" x2="200" y2="370" />
    <line x1="280" y1="0" x2="280" y2="370" />
    <line x1="360" y1="0" x2="360" y2="370" />
    <line x1="440" y1="0" x2="440" y2="370" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -15)">
    <!-- Line AB -->
    <line x1="140" y1="260" x2="380" y2="260" stroke="#64748b" stroke-width="2" />

    <!-- Arc AC with center B(380,260) and radius 240 -->
    <!-- Arc goes from A(140,260) to C(260, 52.2). Since center is B, it curves upwards -->
    <path d="M 140 260 A 240 240 0 0 1 260 52.2" fill="none" stroke="#0284c7" stroke-width="2" />

    <!-- Arc BC with center A(140,260) and radius 240 -->
    <!-- Arc goes from B(380,260) to C(260, 52.2) -->
    <path d="M 380 260 A 240 240 0 0 0 260 52.2" fill="none" stroke="#0284c7" stroke-width="2" />

    <!-- Small Circle: center (260, 170), radius 90 -->
    <circle cx="260" cy="170" r="90" fill="url(#smallCircleGrad)" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Vertices labels -->
    <circle cx="140" cy="260" r="4.5" fill="#0f172a" />
    <text x="130" y="275" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="380" cy="260" r="4.5" fill="#0f172a" />
    <text x="390" y="275" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="260" cy="52.2" r="4.5" fill="#0f172a" />
    <text x="260" y="40" fill="#0f172a" font-size="14" font-weight="bold" text-anchor="middle">C</text>

    <!-- Midpoint D -->
    <circle cx="260" cy="260" r="4" fill="#7c3aed" />
    <text x="260" y="280" fill="#7c3aed" font-size="13" font-weight="bold" text-anchor="middle">D</text>

    <!-- Center of small circle -->
    <circle cx="260" cy="170" r="3.5" fill="#7c3aed" />

    <!-- Radius of small circle label -->
    <line x1="260" y1="170" x2="260" y2="260" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="270" y="220" fill="#7c3aed" font-size="13" font-weight="bold">r = 3/8 L</text>

    <!-- Arc length label -->
    <text x="330" y="140" fill="#0284c7" font-size="13" font-weight="bold">Arc BC = 12</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Arc BC = 12 (60°) ➔ L = 72 ➔ r = 3/8 L ➔ Circumference = 27</text>
  </g>
</svg>

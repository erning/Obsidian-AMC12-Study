<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 345" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="circGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="345" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="345" />
    <line x1="120" y1="0" x2="120" y2="345" />
    <line x1="200" y1="0" x2="200" y2="345" />
    <line x1="280" y1="0" x2="280" y2="345" />
    <line x1="360" y1="0" x2="360" y2="345" />
    <line x1="440" y1="0" x2="440" y2="345" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -40)">
    <!-- Circle Center O = (260, 200), Radius R = 135 px -->
    <circle cx="260" cy="200" r="135" fill="url(#circGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Center Point O -->
    <circle cx="260" cy="200" r="4.5" fill="#0f172a" />
    <text x="268" y="195" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Parallel Lines at y = -d/2 (-25 px), y = d/2 (+25 px), y = 3d/2 (+75 px) -->
    <!-- Line 1: y = 200 - 25 = 175 px (Chord 19) -->
    <line x1="128" y1="175" x2="392" y2="175" stroke="#7c3aed" stroke-width="2.5" />
    <text x="398" y="180" fill="#7c3aed" font-size="13" font-weight="bold">Chord = 19</text>

    <!-- Line 2: y = 200 + 25 = 225 px (Chord 19) -->
    <line x1="128" y1="225" x2="392" y2="225" stroke="#7c3aed" stroke-width="2.5" />
    <text x="398" y="230" fill="#7c3aed" font-size="13" font-weight="bold">Chord = 19</text>

    <!-- Line 3: y = 200 + 75 = 275 px (Chord 17) -->
    <line x1="148" y1="275" x2="372" y2="275" stroke="#e11d48" stroke-width="2.5" />
    <text x="378" y="280" fill="#e11d48" font-size="13" font-weight="bold">Chord = 17</text>

    <!-- Distance d arrows -->
    <line x1="260" y1="175" x2="260" y2="225" stroke="#d97706" stroke-width="1.8" stroke-dasharray="3,3" />
    <text x="245" y="205" fill="#b45309" font-size="13" font-weight="bold">d = 6</text>

    <line x1="260" y1="225" x2="260" y2="275" stroke="#d97706" stroke-width="1.8" stroke-dasharray="3,3" />
    <text x="245" y="255" fill="#b45309" font-size="13" font-weight="bold">d = 6</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">r² - d²/4 = 19², r² - 9d²/4 = 17² ➔ 2d² = 19² - 17² = 72 ➔ Distance d = 6</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 335" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="trapGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="triPABGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="triPCDGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e11d48" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#be123c" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="335" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="335" />
    <line x1="120" y1="0" x2="120" y2="335" />
    <line x1="200" y1="0" x2="200" y2="335" />
    <line x1="280" y1="0" x2="280" y2="335" />
    <line x1="360" y1="0" x2="360" y2="335" />
    <line x1="440" y1="0" x2="440" y2="335" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -50)">
    <!-- Trapezoid Vertices:
         A = (60, 300), B = (460, 300) [Base a = 400 px]
         D = (160, 90), C = (300, 90)   [Base b = 140 px]
         Interior Point P = (220, 210)
    -->
    <polygon points="60,300 460,300 300,90 160,90" fill="url(#trapGrad2)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- 4 Triangles created by P: PAB, PBC, PCD, PDA -->
    <polygon points="60,300 460,300 220,210" fill="url(#triPABGrad)" stroke="#7c3aed" stroke-width="2" />
    <polygon points="160,90 300,90 220,210" fill="url(#triPCDGrad)" stroke="#e11d48" stroke-width="2" />

    <line x1="60" y1="300" x2="220" y2="210" stroke="#64748b" stroke-width="1.8" />
    <line x1="460" y1="300" x2="220" y2="210" stroke="#64748b" stroke-width="1.8" />
    <line x1="160" y1="90" x2="220" y2="210" stroke="#64748b" stroke-width="1.8" />
    <line x1="300" y1="90" x2="220" y2="210" stroke="#64748b" stroke-width="1.8" />

    <!-- Point P -->
    <circle cx="220" cy="210" r="5.5" fill="#0f172a" />
    <text x="230" y="215" fill="#0f172a" font-size="15" font-weight="bold">P</text>

    <!-- Area Labels -->
    <text x="260" y="270" fill="#7c3aed" font-size="15" font-weight="bold" text-anchor="middle">Area = 4</text>
    <text x="230" y="145" fill="#e11d48" font-size="15" font-weight="bold" text-anchor="middle">Area = 2</text>
    <text x="130" y="210" fill="#0284c7" font-size="14" font-weight="bold">Area = 3</text>
    <text x="340" y="210" fill="#0284c7" font-size="14" font-weight="bold">Area = 5</text>

    <!-- Vertices Labels -->
    <circle cx="60" cy="300" r="4.5" fill="#0f172a" />
    <text x="45" y="310" fill="#0f172a" font-size="15" font-weight="bold">A</text>

    <circle cx="460" cy="300" r="4.5" fill="#0f172a" />
    <text x="470" y="310" fill="#0f172a" font-size="15" font-weight="bold">B</text>

    <circle cx="300" cy="90" r="4.5" fill="#0f172a" />
    <text x="310" y="85" fill="#0f172a" font-size="15" font-weight="bold">C</text>

    <circle cx="160" cy="90" r="4.5" fill="#0f172a" />
    <text x="145" y="85" fill="#0f172a" font-size="15" font-weight="bold">D</text>

    <!-- Base Length Labels -->
    <text x="260" y="320" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">AB = a</text>
    <text x="230" y="75" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">CD = b</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">(a+b)(8/a + 4/b) = 28 ➔ r² - 4r + 2 = 0 ➔ a/b = 2 + √2</text>
  </g>
</svg>

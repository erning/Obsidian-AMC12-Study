<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="trapGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="400" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="400" />
    <line x1="120" y1="0" x2="120" y2="400" />
    <line x1="200" y1="0" x2="200" y2="400" />
    <line x1="280" y1="0" x2="280" y2="400" />
    <line x1="360" y1="0" x2="360" y2="400" />
    <line x1="440" y1="0" x2="440" y2="400" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, 15)">
    <!-- Coordinate Axes: Origin A(140, 160) -->
    <line x1="40" y1="160" x2="480" y2="160" stroke="#64748b" stroke-width="1.5" />
    <text x="465" y="150" fill="#64748b" font-size="13" font-weight="bold">x</text>

    <line x1="140" y1="340" x2="140" y2="50" stroke="#64748b" stroke-width="1.5" />
    <text x="150" y="65" fill="#64748b" font-size="13" font-weight="bold">y</text>

    <!-- Points:
         A = (140, 160)
         C(15,0) = (440, 160)
         P(5,0) = (240, 160)
         B(33/5, 56/5) = (272, 60)
         E(21/5, -28/5) = (224, 210)
         D(9/5, -112/5) = (176, 310)
    -->

    <!-- Polygon ABCD & ABCE -->
    <polygon points="140,160 272,60 440,160 176,310" fill="url(#trapGrad1)" stroke="#0284c7" stroke-width="2" />
    
    <!-- Line BP through E and D -->
    <line x1="288" y1="10" x2="160" y2="360" stroke="#e11d48" stroke-width="2.5" />
    <text x="295" y="30" fill="#e11d48" font-size="13" font-weight="bold">Line BP (slope = 7)</text>

    <!-- Segment DE -->
    <line x1="224" y1="210" x2="176" y2="310" stroke="#7c3aed" stroke-width="3" />

    <!-- Points Circles & Labels -->
    <circle cx="140" cy="160" r="5" fill="#0f172a" />
    <text x="125" y="155" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="440" cy="160" r="5" fill="#0f172a" />
    <text x="450" y="155" fill="#0f172a" font-size="14" font-weight="bold">C(15,0)</text>

    <circle cx="240" cy="160" r="4.5" fill="#0f172a" />
    <text x="235" y="150" fill="#0f172a" font-size="14" font-weight="bold">P(5,0)</text>

    <circle cx="272" cy="60" r="5" fill="#0284c7" />
    <text x="282" y="55" fill="#0284c7" font-size="14" font-weight="bold">B</text>

    <circle cx="224" cy="210" r="5" fill="#7c3aed" />
    <text x="235" y="215" fill="#7c3aed" font-size="14" font-weight="bold">E</text>

    <circle cx="176" cy="310" r="5" fill="#7c3aed" />
    <text x="185" y="325" fill="#7c3aed" font-size="14" font-weight="bold">D</text>

    <text x="215" y="270" fill="#7c3aed" font-size="13" font-weight="bold">DE = 12√2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">CD ∥ AB, AE ∥ BC ➔ D(9/5, -112/5), E(21/5, -28/5) ➔ DE = 12√2</text>
  </g>
</svg>

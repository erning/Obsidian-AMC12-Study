<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 280" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="paraGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="280" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="280" />
    <line x1="120" y1="0" x2="120" y2="280" />
    <line x1="200" y1="0" x2="200" y2="280" />
    <line x1="280" y1="0" x2="280" y2="280" />
    <line x1="360" y1="0" x2="360" y2="280" />
    <line x1="440" y1="0" x2="440" y2="280" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -105)">
    <!-- Parallelogram ABCD centered at O=(260, 200) -->
    <!-- A = (260-85, 200) = (175, 200) -->
    <!-- C = (260+85, 200) = (345, 200) -->
    <!-- B = (260+101, 200-54) = (361, 146) -->
    <!-- D = (260-101, 200+54) = (159, 254) -->
    <polygon points="175,200 361,146 345,200 159,254" fill="url(#paraGrad)" stroke="#0284c7" stroke-width="2" />
    
    <!-- Diagonals AC and BD -->
    <line x1="175" y1="200" x2="345" y2="200" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" />
    <line x1="159" y1="254" x2="361" y2="146" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,2" />
    
    <!-- Projections P, Q onto BD from A, C -->
    <!-- P is on BD: (260-66, 200+35) = (194, 235) -->
    <!-- Q is on BD: (260+66, 200-35) = (326, 165) -->
    <line x1="175" y1="200" x2="194" y2="235" stroke="#7c3aed" stroke-width="1.5" />
    <line x1="345" y1="200" x2="326" y2="165" stroke="#7c3aed" stroke-width="1.5" />
    <!-- Right angle symbols for projections -->
    <path d="M 190 227 L 180 232 L 184 240" fill="none" stroke="#7c3aed" stroke-width="1" />
    <path d="M 330 173 L 340 168 L 336 160" fill="none" stroke="#7c3aed" stroke-width="1" />

    <!-- Projections R, S onto AC from B, D -->
    <!-- R is on AC: (361, 200) -->
    <!-- S is on AC: (159, 200) -->
    <line x1="361" y1="146" x2="361" y2="200" stroke="#e11d48" stroke-width="1.5" />
    <line x1="159" y1="254" x2="159" y2="200" stroke="#e11d48" stroke-width="1.5" />

    <!-- Points -->
    <circle cx="260" cy="200" r="4" fill="#0f172a" />
    <text x="265" y="195" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <circle cx="175" cy="200" r="4" fill="#0f172a" />
    <text x="160" y="195" fill="#0f172a" font-size="14" font-weight="bold">A</text>
    <circle cx="345" cy="200" r="4" fill="#0f172a" />
    <text x="350" y="195" fill="#0f172a" font-size="14" font-weight="bold">C</text>
    <circle cx="361" cy="146" r="4" fill="#0f172a" />
    <text x="366" y="140" fill="#0f172a" font-size="14" font-weight="bold">B</text>
    <circle cx="159" cy="254" r="4" fill="#0f172a" />
    <text x="144" y="265" fill="#0f172a" font-size="14" font-weight="bold">D</text>

    <!-- Project points labels -->
    <circle cx="194" cy="235" r="3.5" fill="#7c3aed" />
    <text x="194" y="252" fill="#7c3aed" font-size="13" font-weight="bold">P</text>
    <circle cx="326" cy="165" r="3.5" fill="#7c3aed" />
    <text x="320" y="152" fill="#7c3aed" font-size="13" font-weight="bold">Q</text>

    <circle cx="361" cy="200" r="3.5" fill="#e11d48" />
    <text x="365" y="215" fill="#e11d48" font-size="13" font-weight="bold">R</text>
    <circle cx="159" cy="200" r="3.5" fill="#e11d48" />
    <text x="145" y="215" fill="#e11d48" font-size="13" font-weight="bold">S</text>

    <!-- Labels for lengths -->
    <text x="260" y="250" fill="#7c3aed" font-size="13" font-weight="bold" text-anchor="middle">PQ = 6</text>
    <text x="260" y="130" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">RS = 8</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">u cos θ = 6, d cos θ = 8, 1/2 u d sin θ = 15 ➔ d² = 32 + 8√41</text>
  </g>
</svg>

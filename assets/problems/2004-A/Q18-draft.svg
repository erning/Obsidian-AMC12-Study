<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 370" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="sqGrad2004" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="semiGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.03" />
    </linearGradient>
  </defs>
  <rect width="520" height="370" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="370" />
    <line x1="120" y1="0" x2="120" y2="370" />
    <line x1="200" y1="0" x2="200" y2="370" />
    <line x1="280" y1="0" x2="280" y2="370" />
    <line x1="360" y1="0" x2="360" y2="370" />
    <line x1="440" y1="0" x2="440" y2="370" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -15)">
    <!-- Square ABCD: A(140, 50), B(140, 290), C(380, 290), D(380, 50) -->
    <rect x="140" y="50" width="240" height="240" fill="url(#sqGrad2004)" stroke="#64748b" stroke-width="2.5" />

    <!-- Semicircle on diameter AB: Center(140, 170), Radius 120, x >= 140 -->
    <!-- Path representing the semicircle -->
    <path d="M 140 50 A 120 120 0 0 1 140 290 Z" fill="url(#semiGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Tangent line CE: C(380, 290) to E(200, 50) -->
    <line x1="380" y1="290" x2="200" y2="50" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Tangent Point F(236, 98) -->
    <circle cx="236" cy="98" r="4.5" fill="#7c3aed" />
    <text x="245" y="95" fill="#7c3aed" font-size="13" font-weight="bold">F</text>

    <!-- Vertices labels -->
    <circle cx="140" cy="50" r="4.5" fill="#0f172a" />
    <text x="125" y="45" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="140" cy="290" r="4.5" fill="#0f172a" />
    <text x="125" y="305" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="380" cy="290" r="4.5" fill="#0f172a" />
    <text x="390" y="305" fill="#0f172a" font-size="14" font-weight="bold">C</text>

    <circle cx="380" cy="50" r="4.5" fill="#0f172a" />
    <text x="390" y="45" fill="#0f172a" font-size="14" font-weight="bold">D</text>

    <circle cx="200" cy="50" r="4.5" fill="#7c3aed" />
    <text x="200" y="40" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">E</text>

    <!-- Cut markers & labels -->
    <text x="170" y="40" fill="#7c3aed" font-size="12" font-weight="bold">x</text>
    <text x="290" y="305" fill="#0284c7" font-size="12" font-weight="bold">2</text>
    <text x="210" y="80" fill="#7c3aed" font-size="12" font-weight="bold" transform="rotate(-53 210 80)">x</text>
    <text x="300" y="200" fill="#7c3aed" font-size="12" font-weight="bold" transform="rotate(-53 300 200)">2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">CE = 2 + x, DE = 2 - x, CD = 2 ➔ (2-x)² + 2² = (2+x)² ➔ x = 1/2 ➔ CE = 5/2</text>
  </g>
</svg>

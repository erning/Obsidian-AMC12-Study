<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 270" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="shadedGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97706" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#b45309" stop-opacity="0.15" />
    </linearGradient>
  </defs>
  <rect width="520" height="270" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="270" />
    <line x1="120" y1="0" x2="120" y2="270" />
    <line x1="200" y1="0" x2="200" y2="270" />
    <line x1="280" y1="0" x2="280" y2="270" />
    <line x1="360" y1="0" x2="360" y2="270" />
    <line x1="440" y1="0" x2="440" y2="270" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -115)">
    <!-- Big Semicircle: Center(260, 290), Radius 200 (Shaded area) -->
    <path d="M 60 290 A 200 200 0 0 1 460 290 Z" fill="url(#shadedGrad2)" stroke="#b45309" stroke-width="2.5" />

    <!-- Three masking white semicircles: Radius 100 -->
    <!-- Semicircle 1: Center(160, 290) -->
    <path d="M 60 290 A 100 100 0 0 1 260 290 Z" fill="#ffffff" stroke="#0284c7" stroke-width="1.8" />
    <!-- Semicircle 3: Center(360, 290) -->
    <path d="M 260 290 A 100 100 0 0 1 460 290 Z" fill="#ffffff" stroke="#0284c7" stroke-width="1.8" />
    <!-- Semicircle 2: Center(260, 290) -->
    <path d="M 160 290 A 100 100 0 0 1 360 290 Z" fill="#ffffff" stroke="#0284c7" stroke-width="1.8" />

    <!-- Diameters line -->
    <line x1="60" y1="290" x2="460" y2="290" stroke="#0f172a" stroke-width="2" />

    <!-- Equilateral triangle lines to show how intersection is computed -->
    <polygon points="160,290 210,203.4 260,290" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2,2" />
    <polygon points="260,290 310,203.4 360,290" fill="none" stroke="#7c3aed" stroke-width="1" stroke-dasharray="2,2" />

    <!-- Intersection points (purple dots) -->
    <circle cx="210" cy="203.4" r="3.5" fill="#7c3aed" />
    <circle cx="310" cy="203.4" r="3.5" fill="#7c3aed" />

    <!-- Vertices labels -->
    <circle cx="60" cy="290" r="4.5" fill="#0f172a" />
    <text x="50" y="305" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="460" cy="290" r="4.5" fill="#0f172a" />
    <text x="470" y="305" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <!-- Centers labels -->
    <circle cx="160" cy="290" r="3.5" fill="#0284c7" />
    <text x="160" y="305" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">C₁</text>

    <circle cx="260" cy="290" r="3.5" fill="#0284c7" />
    <text x="260" y="305" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">C₂</text>

    <circle cx="360" cy="290" r="3.5" fill="#0284c7" />
    <text x="360" y="305" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">C₃</text>

    <!-- Dimension labels -->
    <text x="260" y="140" fill="#b45309" font-size="14" font-weight="bold" text-anchor="middle">Big R = 2</text>
    <text x="110" y="270" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">r = 1</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Area = Big Semicircle - 5 × Sector(60°) - 2 × EqTriangle = 7π/6 - √3/2</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="circleA" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="circleB" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="circleC" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>
  <rect width="520" height="600" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="600" />
    <line x1="120" y1="0" x2="120" y2="600" />
    <line x1="200" y1="0" x2="200" y2="600" />
    <line x1="280" y1="0" x2="280" y2="600" />
    <line x1="360" y1="0" x2="360" y2="600" />
    <line x1="440" y1="0" x2="440" y2="600" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 215)">
    <!-- Common tangent line at Y = 290 -->
    <line x1="40" y1="290" x2="480" y2="290" stroke="#0f172a" stroke-width="2" />

    <!-- Circle A: Center(140, 230), Radius 60 -->
    <circle cx="140" cy="230" r="60" fill="url(#circleA)" stroke="#0284c7" stroke-width="2" />

    <!-- Circle B: Center(380, 50), Radius 240 -->
    <circle cx="380" cy="50" r="240" fill="url(#circleB)" stroke="#0284c7" stroke-width="2" />

    <!-- Circle C: Center(220, 263.3), Radius 26.7 -->
    <circle cx="220" cy="263.3" r="26.7" fill="url(#circleC)" stroke="#7c3aed" stroke-width="2" />

    <!-- Centers and Tangent Points -->
    <circle cx="140" cy="230" r="4.5" fill="#0284c7" />
    <text x="140" y="220" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">A</text>

    <circle cx="380" cy="50" r="4.5" fill="#0284c7" />
    <text x="380" y="40" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">B</text>

    <circle cx="220" cy="263.3" r="3" fill="#7c3aed" />
    <text x="220" y="255" fill="#7c3aed" font-size="11" font-weight="bold" text-anchor="middle">C</text>

    <!-- Radius labels -->
    <text x="95" y="200" fill="#0284c7" font-size="12" font-weight="bold">R = 1</text>
    <text x="380" y="150" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">R = 4</text>
    <text x="220" y="280" fill="#7c3aed" font-size="10" font-weight="bold" text-anchor="middle">x</text>

    <!-- Cut markers on tangent line -->
    <circle cx="140" cy="290" r="3" fill="#0f172a" />
    <circle cx="220" cy="290" r="3" fill="#7c3aed" />
    <circle cx="380" cy="290" r="3" fill="#0f172a" />

    <!-- Distance Labels on tangent line -->
    <line x1="140" y1="305" x2="220" y2="305" stroke="#64748b" stroke-width="1.2" />
    <text x="180" y="320" fill="#64748b" font-size="11" font-weight="bold" text-anchor="middle">2√x</text>

    <line x1="220" y1="305" x2="380" y2="305" stroke="#64748b" stroke-width="1.2" />
    <text x="300" y="320" fill="#64748b" font-size="11" font-weight="bold" text-anchor="middle">2√4x</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">2√x + 2√4x = 2√1×4 = 4 ➔ 6√x = 4 ➔ x = 4/9</text>
  </g>
</svg>

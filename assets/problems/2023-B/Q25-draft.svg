<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 355" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="pGradOrig" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="pGradNew" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="355" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="355" />
    <line x1="120" y1="0" x2="120" y2="355" />
    <line x1="200" y1="0" x2="200" y2="355" />
    <line x1="280" y1="0" x2="280" y2="355" />
    <line x1="360" y1="0" x2="360" y2="355" />
    <line x1="440" y1="0" x2="440" y2="355" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -30)">
    <!-- Center O = (260, 200), Circumradius R = 130 px -->
    <!-- Original Pentagon Vertices (Angles 90, 162, 234, 306, 18 deg) -->
    <!-- V1=(260, 70), V2=(136, 160), V3=(183, 305), V4=(337, 305), V5=(384, 160) -->
    <polygon points="260,70 136,160 183,305 337,305 384,160" fill="url(#pGradOrig)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Center O -->
    <circle cx="260" cy="200" r="4.5" fill="#0f172a" />
    <text x="268" y="200" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Fold Crease Lines (Perpendicular bisectors of O-V_k, distance R/2 = 65 px from center) -->
    <!-- Creases form a smaller inner pentagon with apothem R/2 -->
    <!-- New Pentagon Vertices (Angles 54, 126, 198, 270, 342 deg, radius R/(2 cos 36) = 80.3 px) -->
    <!-- N1=(307, 135), N2=(213, 135), N3=(184, 225), N4=(260, 280), N5=(336, 225) -->
    <polygon points="307,135 213,135 184,225 260,280 336,225" fill="url(#pGradNew)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Radial Rays to Original Vertices (Dashed) -->
    <line x1="260" y1="200" x2="260" y2="70" stroke="#d97706" stroke-width="1.8" stroke-dasharray="4,3" />
    <text x="265" y="105" fill="#b45309" font-size="12" font-weight="bold">R/2</text>

    <!-- Original Side & Apothem Labels -->
    <text x="260" y="55" fill="#0284c7" font-size="14" font-weight="bold" text-anchor="middle">Original Area = √5 + 1</text>
    <text x="260" y="215" fill="#7c3aed" font-size="13" font-weight="bold" text-anchor="middle">New Folded Pentagon</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Ratio = (1/2 cos 36°)² = (3-√5)/2 ➔ New Area = (√5+1)(3-√5)/2 = √5 - 1</text>
  </g>
</svg>

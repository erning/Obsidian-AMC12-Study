<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 305" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="triGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="305" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="305" />
    <line x1="120" y1="0" x2="120" y2="305" />
    <line x1="200" y1="0" x2="200" y2="305" />
    <line x1="280" y1="0" x2="280" y2="305" />
    <line x1="360" y1="0" x2="360" y2="305" />
    <line x1="440" y1="0" x2="440" y2="305" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -80)">
    <!-- Obtuse Triangle ABC with 120 deg angle at C:
         C = (180, 290) [Obtuse vertex 120 deg]
         A = (60, 290)  [Short side CA = 6 -> 120 px]
         B = (380, 110) [Side CB = 10 -> 200 px at -30 deg slope]
         Longest side AB = 14 -> 350 px
    -->
    <polygon points="60,290 380,110 180,290" fill="url(#triGrad)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Angle 120 deg arc at C -->
    <path d="M 150 290 A 30 30 0 0 1 165 264" fill="none" stroke="#d97706" stroke-width="2" />
    <text x="175" y="270" fill="#b45309" font-size="13" font-weight="bold">120°</text>

    <!-- Side Lengths -->
    <text x="120" y="310" fill="#0f172a" font-size="14" font-weight="bold">a = 6</text>
    <text x="290" y="190" fill="#0f172a" font-size="14" font-weight="bold">b = 10</text>
    <text x="210" y="180" fill="#0284c7" font-size="14" font-weight="bold">c = 14 (Longest)</text>

    <!-- Vertices -->
    <circle cx="180" cy="290" r="5" fill="#d97706" />
    <text x="185" y="315" fill="#d97706" font-size="15" font-weight="bold">C(120°)</text>

    <circle cx="60" cy="290" r="4.5" fill="#0f172a" />
    <text x="45" y="300" fill="#0f172a" font-size="15" font-weight="bold">A</text>

    <circle cx="380" cy="110" r="4.5" fill="#0f172a" />
    <text x="392" y="115" fill="#0f172a" font-size="15" font-weight="bold">B</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Cosines: (6+2d)² = 6²+(6+d)² - 2·6(6+d)cos 120° ➔ d=4 ➔ Area = 15√3</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 340" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="frustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="340" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="340" />
    <line x1="120" y1="0" x2="120" y2="340" />
    <line x1="200" y1="0" x2="200" y2="340" />
    <line x1="280" y1="0" x2="280" y2="340" />
    <line x1="360" y1="0" x2="360" y2="340" />
    <line x1="440" y1="0" x2="440" y2="340" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -45)">
    <!-- Left: 3D Frustum -->
    <g transform="translate(0, -45)">
      <!-- Top Ellipse (r=3) -->
      <ellipse cx="90" cy="80" rx="40" ry="12" fill="url(#frustGrad)" stroke="#0284c7" stroke-width="2" />
      <!-- Bottom Ellipse (r=6) -->
      <ellipse cx="90" cy="220" rx="80" ry="24" fill="url(#frustGrad)" stroke="#0284c7" stroke-width="2" />
      <!-- Slant Edges -->
      <line x1="50" y1="80" x2="10" y2="220" stroke="#0284c7" stroke-width="2" />
      <line x1="130" y1="80" x2="170" y2="220" stroke="#0284c7" stroke-width="2" />
      <!-- Height Line -->
      <line x1="90" y1="80" x2="90" y2="220" stroke="#d97706" stroke-width="1.8" stroke-dasharray="4,3" />
      <text x="98" y="150" fill="#b45309" font-size="12" font-weight="bold">h = 3√3</text>
      <!-- Bug and Honey -->
      <circle cx="170" cy="220" r="5" fill="#e11d48" />
      <text x="175" y="240" fill="#e11d48" font-size="13" font-weight="bold">Bug</text>
      <circle cx="50" cy="80" r="5" fill="#e11d48" />
      <text x="20" y="70" fill="#e11d48" font-size="13" font-weight="bold">Honey</text>
    </g>

    <!-- Right: Unfolded 180 deg Sector -->
    <g transform="translate(0, -45)">
      <!-- Outer Semi-circle radius 140 (R=12) -->
      <!-- Inner Semi-circle radius 70 (r=6) -->
      <path d="M 20 220 A 140 140 0 0 1 300 220 L 230 220 A 70 70 0 0 0 90 220 Z" fill="url(#frustGrad)" stroke="#7c3aed" stroke-width="2" />
      
      <!-- Apex O -->
      <circle cx="160" cy="220" r="4" fill="#0f172a" />
      <text x="160" y="240" fill="#0f172a" font-size="13" font-weight="bold" text-anchor="middle">Apex O</text>

      <!-- Bug Point (300, 220) -->
      <circle cx="300" cy="220" r="5" fill="#e11d48" />
      <text x="310" y="225" fill="#e11d48" font-size="13" font-weight="bold">Bug</text>

      <!-- Honey Point (90, 220) -->
      <circle cx="90" cy="220" r="5" fill="#e11d48" />
      <text x="50" y="225" fill="#e11d48" font-size="13" font-weight="bold">Honey</text>

      <!-- Tangent Path Line from Bug (300, 220) to Tangent Point T on inner circle -->
      <!-- Tangent T at 60 deg angle: (160 + 70*cos 60, 220 - 70*sin 60) = (195, 159) -->
      <line x1="300" y1="220" x2="195" y2="159" stroke="#e11d48" stroke-width="2.5" />
      <text x="260" y="175" fill="#e11d48" font-size="12" font-weight="bold">6√3</text>

      <!-- Arc from T to Honey on inner circle -->
      <path d="M 195 159 A 70 70 0 0 0 90 220" fill="none" stroke="#e11d48" stroke-width="2.5" stroke-dasharray="4,2" />
      <text x="130" y="165" fill="#e11d48" font-size="12" font-weight="bold">π</text>
    </g>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Unfolded 180° Sector: Tangent = √(12²-6²) = 6√3, Arc = 6(π/6) = π ➔ Path = 6√3 + π</text>
  </g>
</svg>

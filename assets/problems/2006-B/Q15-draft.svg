<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 390" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="hexagonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="390" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="390" />
    <line x1="120" y1="0" x2="120" y2="390" />
    <line x1="200" y1="0" x2="200" y2="390" />
    <line x1="280" y1="0" x2="280" y2="390" />
    <line x1="360" y1="0" x2="360" y2="390" />
    <line x1="440" y1="0" x2="440" y2="390" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 5)">
    <!-- Hexagon AOBCPD: A(123.3, 104.6), O(150, 180), B(123.3, 255.4), C(336.7, 330.9), P(390, 180), D(336.7, 29.1) -->
    <polygon points="123.3,104.6 150,180 123.3,255.4 336.7,330.9 390,180 336.7,29.1" fill="url(#hexagonGrad)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Circles O and P -->
    <circle cx="150" cy="180" r="80" fill="none" stroke="#0284c7" stroke-width="2" />
    <circle cx="390" cy="180" r="160" fill="none" stroke="#0284c7" stroke-width="2" />

    <!-- Line of Centers OP -->
    <line x1="150" y1="180" x2="390" y2="180" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,2" />

    <!-- Radii OA, OB, PD, PC -->
    <line x1="150" y1="180" x2="123.3" y2="104.6" stroke="#0284c7" stroke-width="1.5" />
    <line x1="150" y1="180" x2="123.3" y2="255.4" stroke="#0284c7" stroke-width="1.5" />
    <line x1="390" y1="180" x2="336.7" y2="29.1" stroke="#0284c7" stroke-width="1.5" />
    <line x1="390" y1="180" x2="336.7" y2="330.9" stroke="#0284c7" stroke-width="1.5" />

    <!-- Vertices labels -->
    <circle cx="150" cy="180" r="4.5" fill="#0f172a" />
    <text x="145" y="195" fill="#0f172a" font-size="14" font-weight="bold">O</text>

    <circle cx="390" cy="180" r="4.5" fill="#0f172a" />
    <text x="395" y="195" fill="#0f172a" font-size="14" font-weight="bold">P</text>

    <circle cx="123.3" cy="104.6" r="4.5" fill="#7c3aed" />
    <text x="110" y="105" fill="#7c3aed" font-size="14" font-weight="bold">A</text>

    <circle cx="123.3" cy="255.4" r="4.5" fill="#7c3aed" />
    <text x="110" y="260" fill="#7c3aed" font-size="14" font-weight="bold">B</text>

    <circle cx="336.7" cy="330.9" r="4.5" fill="#7c3aed" />
    <text x="345" y="345" fill="#7c3aed" font-size="14" font-weight="bold">C</text>

    <circle cx="336.7" cy="29.1" r="4.5" fill="#7c3aed" />
    <text x="345" y="25" fill="#7c3aed" font-size="14" font-weight="bold">D</text>

    <!-- Side labels -->
    <text x="120" y="150" fill="#0284c7" font-size="12" font-weight="bold">r = 2</text>
    <text x="375" y="110" fill="#0284c7" font-size="12" font-weight="bold">R = 4</text>
    <text x="230" y="55" fill="#7c3aed" font-size="13" font-weight="bold">Tangent = 4√2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Area = 2 × Area(Trapezoid AOPD) = 2 × [1/2 (2+4) × 4√2] = 24√2</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 323" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="tri1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="tri2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="323" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="323" />
    <line x1="120" y1="0" x2="120" y2="323" />
    <line x1="200" y1="0" x2="200" y2="323" />
    <line x1="280" y1="0" x2="280" y2="323" />
    <line x1="360" y1="0" x2="360" y2="323" />
    <line x1="440" y1="0" x2="440" y2="323" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Two Triangles Comparison -->
  <g transform="translate(10, -87)">
    <!-- Equal Height Dotted Line -->
    <line x1="20" y1="120" x2="480" y2="120" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="250" y="112" fill="#e11d48" font-size="12" font-weight="bold" text-anchor="middle">Equal Height h = 8 sin θ (Equal Area)</text>

    <!-- Triangle 1: Obtuse angle theta (e.g. 110 deg) -->
    <!-- Base = 9 (scale S=20 px/unit => 180 px). Base x: [80, 260], y=240 -->
    <!-- Side 8 (160 px) at 110 deg => (80 - 55, 240 - 150) = (25, 90) -->
    <polygon points="80,240 260,240 25,120" fill="url(#tri1Grad)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="80" cy="240" r="4" fill="#0284c7" />
    
    <text x="165" y="258" fill="#0f172a" font-size="12" font-weight="bold">Base = 9</text>
    <text x="35" y="175" fill="#0284c7" font-size="12" font-weight="bold">8</text>
    <text x="145" y="170" fill="#0284c7" font-size="13" font-weight="800">t₁ = 11</text>
    <text x="95" y="230" fill="#0284c7" font-size="11" font-weight="bold">θ₁ (Obtuse)</text>

    <!-- Triangle 2: Acute angle 180 - theta (e.g. 70 deg) -->
    <!-- Base = 9 => x: [300, 480], y=240 -->
    <!-- Side 8 at 70 deg => (300 + 55, 240 - 150) = (355, 90) -->
    <polygon points="300,240 480,240 355,120" fill="url(#tri2Grad)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="300" cy="240" r="4" fill="#7c3aed" />

    <text x="385" y="258" fill="#0f172a" font-size="12" font-weight="bold">Base = 9</text>
    <text x="312" y="175" fill="#7c3aed" font-size="12" font-weight="bold">8</text>
    <text x="425" y="175" fill="#7c3aed" font-size="13" font-weight="800">t₂ = 13</text>
    <text x="315" y="230" fill="#7c3aed" font-size="11" font-weight="bold">180°-θ₁</text>

    <!-- Cosine Law Sum Box -->
    <rect x="40" y="280" width="420" height="120" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" />
    <text x="60" y="305" fill="#0f172a" font-size="13" font-weight="700">📐 Cosine Law Cancellation &amp; Integer Pairing</text>

    <text x="60" y="330" fill="#0284c7" font-size="12" font-weight="bold">t₁² = 8² + 9² - 2(8)(9)cos θ = 145 - 144 cos θ</text>
    <text x="60" y="350" fill="#7c3aed" font-size="12" font-weight="bold">t₂² = 8² + 9² + 2(8)(9)cos θ = 145 + 144 cos θ</text>

    <line x1="60" y1="362" x2="440" y2="362" stroke="#64748b" stroke-width="1" />
    <text x="60" y="385" fill="#15803d" font-size="14" font-weight="800">t₁² + t₂² = 290 ➔ 11² + 13² = 290 (t₁ + t₂ = 24)</text>
  </g>
</svg>

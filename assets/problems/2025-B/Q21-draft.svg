<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 520" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <defs>
    <linearGradient id="tri1Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.08" />
    </linearGradient>

    <linearGradient id="tri2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.08" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="520" fill="#ffffff" rx="12" />

  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="520" />
    <line x1="120" y1="0" x2="120" y2="520" />
    <line x1="200" y1="0" x2="200" y2="520" />
    <line x1="280" y1="0" x2="280" y2="520" />
    <line x1="360" y1="0" x2="360" y2="520" />
    <line x1="440" y1="0" x2="440" y2="520" />
    <line x1="520" y1="0" x2="520" y2="520" />
    <line x1="600" y1="0" x2="600" y2="520" />
    <line x1="680" y1="0" x2="680" y2="520" />
    
    <line x1="0" y1="60" x2="760" y2="60" />
    <line x1="0" y1="140" x2="760" y2="140" />
    <line x1="0" y1="220" x2="760" y2="220" />
    <line x1="0" y1="300" x2="760" y2="300" />
    <line x1="0" y1="380" x2="760" y2="380" />
    <line x1="0" y1="460" x2="760" y2="460" />
  </g>

  <!-- Title -->
  <text x="30" y="40" fill="#0f172a" font-size="20" font-weight="700" letter-spacing="0.5">AMC12 2025-B Q21 Solution Diagram (Supplementary Angles)</text>
  <text x="30" y="62" fill="#475569" font-size="13">Two non-congruent triangles with sides 8, 9 having equal area</text>

  <!-- Left Panel: Two Triangles Comparison -->
  <g transform="translate(0, 10)">
    <!-- Triangle 1: Obtuse angle theta (e.g. 110 deg) -->
    <!-- Base = 9 (scale S=18 px/unit => 162 px). Base x: [50, 212], y=240 -->
    <!-- Side 8 (144 px) at 110 deg => (50 - 49, 240 - 135) = (1, 105) -->
    <polygon points="60,240 220,240 10,120" fill="url(#tri1Grad)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="60" cy="240" r="4" fill="#0284c7" />
    
    <text x="135" y="258" fill="#0f172a" font-size="12" font-weight="bold">Base = 9</text>
    <text x="18" y="180" fill="#0284c7" font-size="12" font-weight="bold">8</text>
    <text x="115" y="165" fill="#0284c7" font-size="13" font-weight="800">t₁ = 11</text>
    <text x="75" y="230" fill="#0284c7" font-size="11" font-weight="bold">θ₁ (Obtuse)</text>

    <!-- Triangle 2: Acute angle 180 - theta (e.g. 70 deg) -->
    <!-- Base = 9 => x: [260, 420], y=240 -->
    <!-- Side 8 at 70 deg => (260 + 49, 240 - 135) = (309, 105) -->
    <polygon points="260,240 420,240 310,120" fill="url(#tri2Grad)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />
    <circle cx="260" cy="240" r="4" fill="#7c3aed" />

    <text x="335" y="258" fill="#0f172a" font-size="12" font-weight="bold">Base = 9</text>
    <text x="270" y="180" fill="#7c3aed" font-size="12" font-weight="bold">8</text>
    <text x="370" y="175" fill="#7c3aed" font-size="13" font-weight="800">t₂ = 13</text>
    <text x="275" y="230" fill="#7c3aed" font-size="11" font-weight="bold">180°-θ₁</text>

    <!-- Equal Height Dotted Line -->
    <line x1="10" y1="120" x2="430" y2="120" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="200" y="112" fill="#e11d48" font-size="12" font-weight="bold">Equal Height h = 8 sin θ</text>

    <!-- Cosine Law Sum Box -->
    <rect x="50" y="290" width="370" height="130" fill="#f8fafc" rx="8" stroke="#cbd5e1" stroke-width="1" />
    <text x="70" y="315" fill="#0f172a" font-size="13" font-weight="700">📐 Cosine Law Cancellation &amp; Integer Pairing</text>

    <text x="70" y="340" fill="#0284c7" font-size="12" font-weight="bold">t₁² = 8² + 9² - 2(8)(9)cos θ = 145 - 144 cos θ</text>
    <text x="70" y="360" fill="#7c3aed" font-size="12" font-weight="bold">t₂² = 8² + 9² + 2(8)(9)cos θ = 145 + 144 cos θ</text>

    <line x1="70" y1="372" x2="400" y2="372" stroke="#64748b" stroke-width="1" />
    <text x="70" y="395" fill="#15803d" font-size="14" font-weight="800">t₁² + t₂² = 290 ➔ 11² + 13² = 290 (t₁ + t₂ = 24)</text>
  </g>

  <!-- Right Panel: Step-by-Step Card -->
  <g transform="translate(480, 80)">
    <rect x="0" y="0" width="250" height="400" fill="#f8fafc" rx="10" stroke="#cbd5e1" stroke-width="1" filter="url(#shadow)" />
    
    <text x="16" y="32" fill="#0f172a" font-size="15" font-weight="700">✍️ Derivation Steps</text>

    <!-- Step 1 -->
    <g transform="translate(16, 50)">
      <circle cx="10" cy="10" r="10" fill="#0284c7" />
      <text x="10" y="14" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">1</text>
      <text x="28" y="14" fill="#0f172a" font-size="13" font-weight="600">Equal Area Principle</text>
      <text x="28" y="32" fill="#475569" font-size="11">Area = (1/2)(8)(9)sin θ = 36 sin θ</text>
      <text x="28" y="46" fill="#0284c7" font-size="12" font-weight="bold">Non-congruent ➔ θ₂ = 180° - θ₁</text>
    </g>

    <!-- Step 2 -->
    <g transform="translate(16, 120)">
      <circle cx="10" cy="10" r="10" fill="#0284c7" />
      <text x="10" y="14" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">2</text>
      <text x="28" y="14" fill="#0f172a" font-size="13" font-weight="600">Law of Cosines Sum</text>
      <text x="28" y="32" fill="#475569" font-size="11">t₁² = 145 - 144 cos θ</text>
      <text x="28" y="48" fill="#7c3aed" font-size="12" font-weight="bold">t₂² = 145 + 144 cos θ ➔ t₁²+t₂²=290</text>
    </g>

    <!-- Step 3 -->
    <g transform="translate(16, 205)">
      <circle cx="10" cy="10" r="10" fill="#0284c7" />
      <text x="10" y="14" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">3</text>
      <text x="28" y="14" fill="#0f172a" font-size="13" font-weight="600">Triangle Inequality</text>
      <text x="28" y="32" fill="#b45309" font-size="11" font-weight="bold">9 - 8 &lt; t_i &lt; 9 + 8</text>
      <text x="28" y="48" fill="#475569" font-size="11">Bounds third side: 1 &lt; t_i &lt; 17</text>
    </g>

    <!-- Step 4 -->
    <g transform="translate(16, 275)">
      <circle cx="10" cy="10" r="10" fill="#16a34a" />
      <text x="10" y="14" fill="#ffffff" font-size="11" font-weight="bold" text-anchor="middle">4</text>
      <text x="28" y="14" fill="#15803d" font-size="13" font-weight="700">Integer Solution</text>
      <text x="28" y="32" fill="#475569" font-size="11">Unique integer pair: 11² + 13² = 290</text>
      <text x="28" y="52" fill="#15803d" font-size="14" font-weight="800">t₁ + t₂ = 11 + 13 = 24</text>
    </g>
  </g>
</svg>

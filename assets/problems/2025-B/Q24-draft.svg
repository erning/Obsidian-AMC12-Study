<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%" style="background-color: #ffffff; font-family: system-ui, -apple-system, sans-serif;">
  <!-- Background -->
  <rect width="500" height="440" fill="#ffffff" rx="12" />

  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="440" />
    <line x1="120" y1="0" x2="120" y2="440" />
    <line x1="200" y1="0" x2="200" y2="440" />
    <line x1="280" y1="0" x2="280" y2="440" />
    <line x1="360" y1="0" x2="360" y2="440" />
    <line x1="440" y1="0" x2="440" y2="440" />
    
    <line x1="0" y1="60" x2="500" y2="60" />
    <line x1="0" y1="140" x2="500" y2="140" />
    <line x1="0" y1="220" x2="500" y2="220" />
    <line x1="0" y1="300" x2="500" y2="300" />
    <line x1="0" y1="380" x2="500" y2="380" />
  </g>

  <!-- Title -->
  <text x="30" y="40" fill="#0f172a" font-size="18" font-weight="700" letter-spacing="0.5">AMC12 2025-B Q24 Trig &amp; Log Intersections</text>
  <text x="30" y="60" fill="#475569" font-size="12">sin(20πx) = log₂₀(x) on bounded domain x ∈ [1/20, 20]</text>

  <!-- Left Diagram: Function Graph & Branch Counting -->
  <g transform="translate(0, 10)">
    <!-- Y-axis bounds y = +1 and y = -1 -->
    <line x1="50" y1="120" x2="450" y2="120" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="40" y="115" fill="#e11d48" font-size="11" font-weight="bold">y = +1</text>

    <line x1="50" y1="360" x2="450" y2="360" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="4,4" />
    <text x="40" y="375" fill="#e11d48" font-size="11" font-weight="bold">y = -1</text>

    <!-- Axes -->
    <line x1="50" y1="240" x2="450" y2="240" stroke="#64748b" stroke-width="1.5" />
    <text x="435" y="230" fill="#64748b" font-size="12" font-weight="700">x</text>

    <!-- Boundary points on X-axis -->
    <!-- x = 1/20 = 0.05 => x_pixel = 80 -->
    <line x1="80" y1="110" x2="80" y2="370" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,3" />
    <text x="65" y="390" fill="#0284c7" font-size="12" font-weight="bold">x = 1/20</text>

    <!-- x = 1 => x_pixel = 180 -->
    <line x1="180" y1="230" x2="180" y2="250" stroke="#64748b" stroke-width="1.5" />
    <text x="175" y="260" fill="#64748b" font-size="12" font-weight="bold">x = 1</text>

    <!-- x = 20 => x_pixel = 420 -->
    <line x1="420" y1="110" x2="420" y2="370" stroke="#0284c7" stroke-width="1.5" stroke-dasharray="3,3" />
    <text x="405" y="390" fill="#0284c7" font-size="12" font-weight="bold">x = 20</text>

    <!-- Logarithm Curve y = log_20(x) -->
    <path d="M 80 360 Q 130 280 180 240 T 420 120" fill="none" stroke="#0284c7" stroke-width="3" />
    <text x="330" y="155" fill="#0284c7" font-size="13" font-weight="800">y = log₂₀(x)</text>

    <!-- Oscillating Sine Wave y = sin(20pi x) -->
    <path d="M 80 360 
             C 85 240, 90 120, 95 120 
             C 100 120, 105 360, 110 360
             C 115 360, 120 120, 125 120
             C 130 120, 135 360, 140 360
             C 145 360, 150 120, 155 120
             C 160 120, 165 360, 170 360
             C 175 360, 180 120, 185 120
             S 200 360, 205 360
             M 380 360
             C 385 360, 390 120, 395 120
             C 400 120, 405 360, 410 360
             C 415 360, 420 120, 420 120" 
          fill="none" stroke="#7c3aed" stroke-width="1.8" />
    <text x="220" y="300" fill="#7c3aed" font-size="13" font-weight="800">y = sin(20πx)</text>

    <!-- Dots for Intersections -->
    <circle cx="80" cy="360" r="4" fill="#e11d48" />
    <circle cx="92" cy="190" r="4" fill="#e11d48" />
    <circle cx="107" cy="310" r="4" fill="#e11d48" />
    <circle cx="123" cy="205" r="4" fill="#e11d48" />
    <circle cx="138" cy="320" r="4" fill="#e11d48" />

    <!-- Half-wave Zoom Callout Box -->
    <rect x="240" y="305" width="180" height="85" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="250" y="325" fill="#0f172a" font-size="11" font-weight="700">🔎 Single Monotonic Branch</text>
    <text x="250" y="343" fill="#475569" font-size="11">Half-wave length Δx = 1/20 = 0.05</text>
    <text x="250" y="361" fill="#15803d" font-size="11" font-weight="bold">➔ 1 Intersection per branch</text>
    <text x="250" y="378" fill="#e11d48" font-size="12" font-weight="bold">Total Intersections = 399</text>
  </g>
</svg>

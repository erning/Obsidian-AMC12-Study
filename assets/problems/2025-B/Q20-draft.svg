<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 258" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="startGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#0284c7" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="goalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.1" />
    </linearGradient>

    <linearGradient id="vanishGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#e11d48" stop-opacity="0.08" />
    </linearGradient>

    <marker id="arrow" viewBox="0 0 520 258" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
    <marker id="arrowBlue" viewBox="0 0 520 258" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0284c7" />
    </marker>
    <marker id="arrowRed" viewBox="0 0 520 258" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e11d48" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="520" height="258" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="258" />
    <line x1="120" y1="0" x2="120" y2="258" />
    <line x1="200" y1="0" x2="200" y2="258" />
    <line x1="280" y1="0" x2="280" y2="258" />
    <line x1="360" y1="0" x2="360" y2="258" />
    <line x1="440" y1="0" x2="440" y2="258" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
  </g>

  <!-- Markov Chain Graph -->
  <!-- 
       Nodes along horizontal y = 170:
       Node 0: x = 60
       Node 1: x = 160
       Node 2: x = 260
       Node 3: x = 360
       Node 4: x = 460
       Vanish Node: y = 330, x = 260 (width = 400)
  -->
  <g transform="translate(0, -110)">
    <!-- Vanish Box at bottom -->
    <rect x="40" y="310" width="440" height="55" fill="url(#vanishGrad)" rx="8" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" />
    <text x="260" y="343" fill="#e11d48" font-size="14" font-weight="800" text-anchor="middle">❌ Vanish / Absorb (Contribution = 0)</text>

    <!-- Node 0 -->
    <circle cx="60" cy="170" r="24" fill="url(#startGrad)" stroke="#0284c7" stroke-width="2.5" />
    <text x="60" y="175" fill="#0f172a" font-size="16" font-weight="800" text-anchor="middle">0</text>
    <text x="60" y="135" fill="#0284c7" font-size="12" font-weight="bold" text-anchor="middle">Start</text>
    <text x="60" y="210" fill="#0284c7" font-size="11" font-weight="bold" text-anchor="middle">f(0)=1/97</text>

    <!-- Node 1 -->
    <circle cx="160" cy="170" r="24" fill="#ffffff" stroke="#64748b" stroke-width="2" />
    <text x="160" y="175" fill="#0f172a" font-size="16" font-weight="800" text-anchor="middle">1</text>
    <text x="160" y="210" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">f(1)=2/97</text>

    <!-- Node 2 -->
    <circle cx="260" cy="170" r="24" fill="#ffffff" stroke="#64748b" stroke-width="2" />
    <text x="260" y="175" fill="#0f172a" font-size="16" font-weight="800" text-anchor="middle">2</text>
    <text x="260" y="210" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">7/2 f(1)</text>

    <!-- Node 3 -->
    <circle cx="360" cy="170" r="24" fill="#ffffff" stroke="#64748b" stroke-width="2" />
    <text x="360" y="175" fill="#0f172a" font-size="16" font-weight="800" text-anchor="middle">3</text>
    <text x="360" y="210" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">13 f(1)</text>

    <!-- Node 4 -->
    <circle cx="460" cy="170" r="24" fill="url(#goalGrad)" stroke="#16a34a" stroke-width="2.5" />
    <text x="460" y="175" fill="#0f172a" font-size="16" font-weight="800" text-anchor="middle">4</text>
    <text x="460" y="135" fill="#16a34a" font-size="12" font-weight="bold" text-anchor="middle">Goal</text>
    <text x="460" y="210" fill="#16a34a" font-size="11" font-weight="bold" text-anchor="middle">f(4)=1</text>

    <!-- Forward Arrows (Top Curvature) -->
    <!-- 0 -> 1 (1/2) -->
    <path d="M 82 160 Q 110 142 138 160" fill="none" stroke="#0284c7" stroke-width="2" marker-end="url(#arrowBlue)" />
    <text x="110" y="140" fill="#0284c7" font-size="11" font-weight="bold" text-anchor="middle">1/2</text>

    <!-- 1 -> 2 (1/4) -->
    <path d="M 182 160 Q 210 142 238 160" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)" />
    <text x="210" y="140" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">1/4</text>

    <!-- 2 -> 3 (1/4) -->
    <path d="M 282 160 Q 310 142 338 160" fill="none" stroke="#64748b" stroke-width="1.8" marker-end="url(#arrow)" />
    <text x="310" y="140" fill="#475569" font-size="11" font-weight="bold" text-anchor="middle">1/4</text>

    <!-- 3 -> 4 (1/4) -->
    <path d="M 382 160 Q 410 142 438 160" fill="none" stroke="#16a34a" stroke-width="2" marker-end="url(#arrow)" />
    <text x="410" y="140" fill="#16a34a" font-size="11" font-weight="bold" text-anchor="middle">1/4</text>

    <!-- Backward Arrows (Bottom Curvature) -->
    <!-- 2 -> 1 (1/4) -->
    <path d="M 238 180 Q 210 198 182 180" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />
    <!-- 3 -> 2 (1/4) -->
    <path d="M 338 180 Q 310 198 282 180" fill="none" stroke="#64748b" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrow)" />

    <!-- Vanish Drop Arrows -->
    <!-- From Node 0 -->
    <line x1="60" y1="194" x2="60" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="72" y="255" fill="#e11d48" font-size="11" font-weight="bold">1/2</text>

    <!-- From Node 1 -->
    <line x1="160" y1="194" x2="160" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="172" y="255" fill="#e11d48" font-size="11" font-weight="bold">1/2</text>

    <!-- From Node 2 -->
    <line x1="260" y1="194" x2="260" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="272" y="255" fill="#e11d48" font-size="11" font-weight="bold">1/2</text>

    <!-- From Node 3 -->
    <line x1="360" y1="194" x2="360" y2="310" stroke="#f43f5e" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowRed)" />
    <text x="372" y="255" fill="#e11d48" font-size="11" font-weight="bold">1/2</text>
  </g>
</svg>

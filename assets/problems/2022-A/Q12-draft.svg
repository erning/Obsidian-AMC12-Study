<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 355" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="tetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="cmdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="355" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="355" />
    <line x1="120" y1="0" x2="120" y2="355" />
    <line x1="200" y1="0" x2="200" y2="355" />
    <line x1="280" y1="0" x2="280" y2="355" />
    <line x1="360" y1="0" x2="360" y2="355" />
    <line x1="440" y1="0" x2="440" y2="355" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -30)">
    <!-- Tetrahedron ABCD Vertices:
         A = (160, 270)
         B = (360, 270)
         C = (200, 320)
         D = (260, 70) [Apex]
         Midpoint M of AB = (260, 270)
    -->
    <polygon points="160,270 360,270 200,320" fill="url(#tetGrad)" stroke="#0284c7" stroke-width="2" />
    
    <!-- Edges to Apex D -->
    <line x1="260" y1="70" x2="160" y2="270" stroke="#0284c7" stroke-width="2" />
    <line x1="260" y1="70" x2="360" y2="270" stroke="#0284c7" stroke-width="2" />
    <line x1="260" y1="70" x2="200" y2="320" stroke="#0284c7" stroke-width="2" />

    <!-- Triangle CMD: Vertices C(200,320), M(260,270), D(260,70) -->
    <polygon points="200,320 260,270 260,70" fill="url(#cmdGrad)" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Vertices -->
    <circle cx="160" cy="270" r="4.5" fill="#0f172a" />
    <text x="145" y="275" fill="#0f172a" font-size="15" font-weight="bold">A</text>

    <circle cx="360" cy="270" r="4.5" fill="#0f172a" />
    <text x="370" y="275" fill="#0f172a" font-size="15" font-weight="bold">B</text>

    <circle cx="200" cy="320" r="4.5" fill="#0f172a" />
    <text x="185" y="335" fill="#0f172a" font-size="15" font-weight="bold">C</text>

    <circle cx="260" cy="70" r="5" fill="#7c3aed" />
    <text x="260" y="55" fill="#7c3aed" font-size="15" font-weight="bold" text-anchor="middle">D</text>

    <circle cx="260" cy="270" r="5" fill="#e11d48" />
    <text x="275" y="280" fill="#e11d48" font-size="15" font-weight="bold">M (Midpoint)</text>

    <!-- Side Length Labels -->
    <text x="215" y="290" fill="#7c3aed" font-size="13" font-weight="bold">CM = √3/2</text>
    <text x="270" y="170" fill="#7c3aed" font-size="13" font-weight="bold">DM = √3/2</text>

    <!-- Angle Arc at M -->
    <path d="M 245 282 A 20 20 0 0 1 260 250" fill="none" stroke="#e11d48" stroke-width="2" />
    <text x="215" y="255" fill="#e11d48" font-size="12" font-weight="bold">∠CMD</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">CM = DM = √3/2, CD = 1 ➔ cos(∠CMD) = (3/4 + 3/4 - 1) / (2·3/4) = 1/3</text>
  </g>
</svg>

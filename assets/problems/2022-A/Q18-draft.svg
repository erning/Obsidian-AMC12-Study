<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 360" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="unitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="360" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="360" />
    <line x1="120" y1="0" x2="120" y2="360" />
    <line x1="200" y1="0" x2="200" y2="360" />
    <line x1="280" y1="0" x2="280" y2="360" />
    <line x1="360" y1="0" x2="360" y2="360" />
    <line x1="440" y1="0" x2="440" y2="360" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -25)">
    <!-- Axes: Origin O = (260, 200), Scale 130 px/unit -->
    <line x1="40" y1="200" x2="480" y2="200" stroke="#64748b" stroke-width="1.5" />
    <text x="465" y="190" fill="#64748b" font-size="13" font-weight="bold">x</text>

    <line x1="260" y1="340" x2="260" y2="50" stroke="#7c3aed" stroke-width="2" />
    <text x="270" y="65" fill="#7c3aed" font-size="13" font-weight="bold">y-axis (Reflection Line)</text>

    <!-- Unit Circle R = 130 px -->
    <circle cx="260" cy="200" r="130" fill="url(#unitGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Start Point (1,0) = (390, 200) -->
    <circle cx="390" cy="200" r="5.5" fill="#0f172a" />
    <text x="400" y="205" fill="#0f172a" font-size="14" font-weight="bold">0°: (1,0)</text>

    <!-- T1 Point 179 deg = (130, 198) -->
    <circle cx="130" cy="198" r="4.5" fill="#0284c7" />
    <text x="80" y="195" fill="#0284c7" font-size="13" font-weight="bold">T₁: 179°</text>

    <!-- T2 Point -1 deg = (390, 202) -->
    <circle cx="390" cy="202" r="4.5" fill="#0284c7" />
    <text x="400" y="220" fill="#0284c7" font-size="13" font-weight="bold">T₂: -1°</text>

    <!-- T3 Point 178 deg = (130, 195) -->
    <circle cx="130" cy="195" r="4.5" fill="#0284c7" />
    <text x="80" y="180" fill="#0284c7" font-size="13" font-weight="bold">T₃: 178°</text>

    <!-- Reflection Arrow across y-axis -->
    <path d="M 380 180 Q 260 120 140 180" fill="none" stroke="#e11d48" stroke-width="2" stroke-dasharray="4,3" />
    <text x="260" y="140" fill="#e11d48" font-size="13" font-weight="bold" text-anchor="middle">Rotate k° ➔ Reflect y-axis</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Odd step 2m+1 gives angle (179-m)° ➔ 179-m = 0° ➔ m=179 ➔ n = 359</text>
  </g>
</svg>

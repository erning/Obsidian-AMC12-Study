<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 315" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="trapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="520" height="315" fill="#ffffff" rx="12" />
  <!-- Grid Pattern -->
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="315" />
    <line x1="120" y1="0" x2="120" y2="315" />
    <line x1="200" y1="0" x2="200" y2="315" />
    <line x1="280" y1="0" x2="280" y2="315" />
    <line x1="360" y1="0" x2="360" y2="315" />
    <line x1="440" y1="0" x2="440" y2="315" />
    
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
  </g>

  <!-- Content Group -->
  <g transform="translate(0, -70)">
    <!-- Trapezoid Vertices:
         A = (80, 290)
         D = (440, 290)
         B = (200, 110)
         C = (320, 110)
         BC = 120 px, AD = 360 px (Ratio 1/3)
    -->
    <polygon points="80,290 200,110 320,110 440,290" fill="url(#trapGrad)" stroke="#0284c7" stroke-width="2.5" stroke-linejoin="round" />

    <!-- Point P = (170, 260) -->
    <!-- Distance PA = 1 (90 px), PB = 2 (153 px), PC = 3 (206 px), PD = 4 (271 px) -->
    <line x1="170" y1="260" x2="80" y2="290" stroke="#e11d48" stroke-width="2" />
    <text x="115" y="270" fill="#e11d48" font-size="13" font-weight="bold">PA = 1</text>

    <line x1="170" y1="260" x2="200" y2="110" stroke="#7c3aed" stroke-width="2" />
    <text x="170" y="180" fill="#7c3aed" font-size="13" font-weight="bold">PB = 2</text>

    <line x1="170" y1="260" x2="320" y2="110" stroke="#7c3aed" stroke-width="2" />
    <text x="260" y="180" fill="#7c3aed" font-size="13" font-weight="bold">PC = 3</text>

    <line x1="170" y1="260" x2="440" y2="290" stroke="#d97706" stroke-width="2" />
    <text x="310" y="270" fill="#b45309" font-size="13" font-weight="bold">PD = 4</text>

    <!-- Point P -->
    <circle cx="170" cy="260" r="5.5" fill="#e11d48" />
    <text x="175" y="280" fill="#e11d48" font-size="15" font-weight="bold">P</text>

    <!-- Vertices Labels -->
    <circle cx="80" cy="290" r="4.5" fill="#0f172a" />
    <text x="60" y="300" fill="#0f172a" font-size="15" font-weight="bold">A</text>

    <circle cx="440" cy="290" r="4.5" fill="#0f172a" />
    <text x="450" y="300" fill="#0f172a" font-size="15" font-weight="bold">D</text>

    <circle cx="200" cy="110" r="4.5" fill="#0f172a" />
    <text x="190" y="95" fill="#0f172a" font-size="15" font-weight="bold">B</text>

    <circle cx="320" cy="110" r="4.5" fill="#0f172a" />
    <text x="325" y="95" fill="#0f172a" font-size="15" font-weight="bold">C</text>

    <!-- Base Length Labels -->
    <text x="260" y="95" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">BC (2q)</text>
    <text x="260" y="315" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">AD (2p)</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">px = (1²-4²)/4 = -15/4, qx = (2²-3²)/4 = -5/4 ➔ BC / AD = q/p = 1/3</text>
  </g>
</svg>

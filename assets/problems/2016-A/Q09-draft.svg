<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 365" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="mainSqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8fafc" />
      <stop offset="100%" stop-color="#f1f5f9" />
    </linearGradient>
    <linearGradient id="shadedSqGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="365" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="365" />
    <line x1="120" y1="0" x2="120" y2="365" />
    <line x1="200" y1="0" x2="200" y2="365" />
    <line x1="280" y1="0" x2="280" y2="365" />
    <line x1="360" y1="0" x2="360" y2="365" />
    <line x1="440" y1="0" x2="440" y2="365" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, -20)">
    <!-- Unit Square ABCD -->
    <rect x="140" y="50" width="240" height="240" fill="url(#mainSqGrad)" stroke="#64748b" stroke-width="2.5" />

    <!-- 4 corner shaded squares of side x = 88.6 px -->
    <!-- Bottom-Left -->
    <rect x="140" y="201.4" width="88.6" height="88.6" fill="url(#shadedSqGrad)" stroke="#0284c7" stroke-width="2" />
    <!-- Top-Left -->
    <rect x="140" y="50" width="88.6" height="88.6" fill="url(#shadedSqGrad)" stroke="#0284c7" stroke-width="2" />
    <!-- Top-Right -->
    <rect x="291.4" y="50" width="88.6" height="88.6" fill="url(#shadedSqGrad)" stroke="#0284c7" stroke-width="2" />
    <!-- Bottom-Right -->
    <rect x="291.4" y="201.4" width="88.6" height="88.6" fill="url(#shadedSqGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Middle rotated square: vertices (260, 232.8), (197.2, 170), (260, 107.2), (322.8, 170) -->
    <polygon points="260,232.8 197.2,170 260,107.2 322.8,170" fill="url(#shadedSqGrad)" stroke="#0284c7" stroke-width="2" />

    <!-- Diagonal of unit square (dashed) -->
    <line x1="140" y1="290" x2="380" y2="50" stroke="#e11d48" stroke-width="1.5" stroke-dasharray="3,2" />

    <!-- Vertices labels -->
    <text x="130" y="300" fill="#64748b" font-size="14" font-weight="bold">A</text>
    <text x="390" y="300" fill="#64748b" font-size="14" font-weight="bold">B</text>
    <text x="390" y="45" fill="#64748b" font-size="14" font-weight="bold">C</text>
    <text x="130" y="45" fill="#64748b" font-size="14" font-weight="bold">D</text>

    <!-- Side and diagonal length indicators -->
    <!-- Diagonal segments: 
         From (140, 290) to (228.6, 201.4) is diagonal of bottom-left square: length √2 x
         From (228.6, 201.4) to (291.4, 138.6) is side of center square: length x
         From (291.4, 138.6) to (380, 50) is diagonal of top-right square: length √2 x
    -->
    <text x="180" y="235" fill="#e11d48" font-size="12" font-weight="bold">√2 x</text>
    <text x="265" y="160" fill="#e11d48" font-size="12" font-weight="bold">x</text>
    <text x="330" y="105" fill="#e11d48" font-size="12" font-weight="bold">√2 x</text>

    <!-- Dimension labels -->
    <text x="260" y="315" fill="#64748b" font-size="14" font-weight="bold" text-anchor="middle">Side = 1</text>
    <text x="175" y="80" fill="#0284c7" font-size="13" font-weight="bold" text-anchor="middle">x</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">2√2 x + x = √2 ➔ x = (4-√2)/7 ➔ a = 4, b = 7 ➔ a+b = 11</text>
  </g>
</svg>

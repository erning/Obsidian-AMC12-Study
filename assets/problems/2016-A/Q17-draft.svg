<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 460" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="sqABCD" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
    <linearGradient id="sqEFGH" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#6d28d9" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="460" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="460" />
    <line x1="120" y1="0" x2="120" y2="460" />
    <line x1="200" y1="0" x2="200" y2="460" />
    <line x1="280" y1="0" x2="280" y2="460" />
    <line x1="360" y1="0" x2="360" y2="460" />
    <line x1="440" y1="0" x2="440" y2="460" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 30)">
    <!-- Original Square ABCD: (185, 275) to (335, 125) -->
    <rect x="185" y="125" width="150" height="150" fill="url(#sqABCD)" stroke="#0284c7" stroke-width="2" />

    <!-- 4 Equilateral Triangles on sides of ABCD -->
    <!-- Top triangle on CD (185,125) and (335,125) -> top vertex (260, -5) -->
    <polygon points="185,125 335,125 260,-5" fill="none" stroke="#64748b" stroke-dasharray="3,3" stroke-width="1.2" />
    <!-- Bottom triangle on AB (185,275) and (335,275) -> bottom vertex (260, 405) -->
    <polygon points="185,275 335,275 260,405" fill="none" stroke="#64748b" stroke-dasharray="3,3" stroke-width="1.2" />
    <!-- Right triangle on BC (335,275) and (335,125) -> right vertex (465, 200) -->
    <polygon points="335,275 335,125 465,200" fill="none" stroke="#64748b" stroke-dasharray="3,3" stroke-width="1.2" />
    <!-- Left triangle on AD (185,275) and (185,125) -> left vertex (55, 200) -->
    <polygon points="185,275 185,125 55,200" fill="none" stroke="#64748b" stroke-dasharray="3,3" stroke-width="1.2" />

    <!-- Square EFGH formed by centers of the triangles -->
    <!-- E(260, 81.7), F(378.3, 200), G(260, 318.3), H(141.7, 200) -->
    <polygon points="260,81.7 378.3,200 260,318.3 141.7,200" fill="url(#sqEFGH)" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Labels for Vertices of ABCD -->
    <circle cx="185" cy="275" r="4.5" fill="#0284c7" />
    <text x="175" y="290" fill="#0284c7" font-size="14" font-weight="bold">A</text>

    <circle cx="335" cy="275" r="4.5" fill="#0284c7" />
    <text x="345" y="290" fill="#0284c7" font-size="14" font-weight="bold">B</text>

    <circle cx="335" cy="125" r="4.5" fill="#0284c7" />
    <text x="345" y="120" fill="#0284c7" font-size="14" font-weight="bold">C</text>

    <circle cx="185" cy="125" r="4.5" fill="#0284c7" />
    <text x="175" y="120" fill="#0284c7" font-size="14" font-weight="bold">D</text>

    <!-- Labels for centers (EFGH) -->
    <circle cx="260" cy="81.7" r="4.5" fill="#7c3aed" />
    <text x="260" y="70" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">E</text>

    <circle cx="378.3" cy="200" r="4.5" fill="#7c3aed" />
    <text x="390" y="205" fill="#7c3aed" font-size="14" font-weight="bold">F</text>

    <circle cx="260" cy="318.3" r="4.5" fill="#7c3aed" />
    <text x="260" y="335" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="middle">G</text>

    <circle cx="141.7" cy="200" r="4.5" fill="#7c3aed" />
    <text x="130" y="205" fill="#7c3aed" font-size="14" font-weight="bold" text-anchor="end">H</text>

    <!-- Center O -->
    <circle cx="260" cy="200" r="4" fill="#0f172a" />
    <text x="250" y="195" fill="#0f172a" font-size="13" font-weight="bold">O</text>

    <!-- Diagonals indicator -->
    <line x1="141.7" y1="200" x2="378.3" y2="200" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="3,2" />
    <text x="320" y="190" fill="#7c3aed" font-size="12" font-weight="bold">Diag EFGH = s + 2s/√3</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">Diag EFGH = 6+2√3, Diag ABCD = 6√2 ➔ Area Ratio = (2+√3)/3</text>
  </g>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 404" width="100%" height="100%" style="background-color: #ffffff; font-family: 'Latin Modern Math', 'Computer Modern', 'STIX Two Text', 'Times New Roman', Cambria, serif;">
  <defs>
    <linearGradient id="circGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#0369a1" stop-opacity="0.05" />
    </linearGradient>
  </defs>
  <rect width="520" height="404" fill="#ffffff" rx="12" />
  <g stroke="#e2e8f0" stroke-width="0.8" stroke-dasharray="4,4">
    <line x1="40" y1="0" x2="40" y2="404" />
    <line x1="120" y1="0" x2="120" y2="404" />
    <line x1="200" y1="0" x2="200" y2="404" />
    <line x1="280" y1="0" x2="280" y2="404" />
    <line x1="360" y1="0" x2="360" y2="404" />
    <line x1="440" y1="0" x2="440" y2="404" />
    <line x1="0" y1="50" x2="520" y2="50" />
    <line x1="0" y1="110" x2="520" y2="110" />
    <line x1="0" y1="170" x2="520" y2="170" />
    <line x1="0" y1="230" x2="520" y2="230" />
    <line x1="0" y1="290" x2="520" y2="290" />
    <line x1="0" y1="350" x2="520" y2="350" />
  </g>
  <g transform="translate(0, 2)">
    <!-- Circle centered at (260, 200), Radius 177 -->
    <circle cx="260" cy="200" r="177" fill="url(#circGrad)" stroke="#0284c7" stroke-width="2.5" />

    <!-- Diameter AB -->
    <line x1="83" y1="200" x2="437" y2="200" stroke="#64748b" stroke-width="2" />

    <!-- Chord CD (from (171.6, 353.4) to (413.4, 111.6)) -->
    <line x1="171.6" y1="353.4" x2="413.4" y2="111.6" stroke="#7c3aed" stroke-width="2.5" />

    <!-- Center O -->
    <circle cx="260" cy="200" r="4.5" fill="#0f172a" />
    <text x="255" y="220" fill="#0f172a" font-size="14" font-weight="bold">O</text>

    <!-- Point A, B, E -->
    <circle cx="83" cy="200" r="4.5" fill="#0f172a" />
    <text x="65" y="205" fill="#0f172a" font-size="14" font-weight="bold">A</text>

    <circle cx="437" cy="200" r="4.5" fill="#0f172a" />
    <text x="445" y="205" fill="#0f172a" font-size="14" font-weight="bold">B</text>

    <circle cx="325" cy="200" r="5" fill="#e11d48" />
    <text x="320" y="220" fill="#e11d48" font-size="14" font-weight="bold">E</text>

    <!-- Point C and D -->
    <circle cx="413.4" cy="111.6" r="4.5" fill="#7c3aed" />
    <text x="420" y="105" fill="#7c3aed" font-size="14" font-weight="bold">C</text>

    <circle cx="171.6" cy="353.4" r="4.5" fill="#7c3aed" />
    <text x="160" y="365" fill="#7c3aed" font-size="14" font-weight="bold">D</text>

    <!-- Angle AEC 45 deg arc -->
    <path d="M 305 200 A 20 20 0 0 1 311 186" fill="none" stroke="#e11d48" stroke-width="1.8" />
    <text x="285" y="185" fill="#e11d48" font-size="12" font-weight="bold">45°</text>

    <!-- Dimensions -->
    <text x="380" y="190" fill="#0284c7" font-size="12" font-weight="bold">BE = 2√5</text>
    <text x="170" y="150" fill="#0284c7" font-size="13" font-weight="bold">Radius = 5√2</text>

    <!-- Result Formula Box -->
    <rect x="50" y="335" width="420" height="40" fill="#f8fafc" rx="6" stroke="#cbd5e1" stroke-width="1" />
    <text x="65" y="360" fill="#15803d" font-size="14" font-weight="bold">t₁ + t₂ = √2(5√2 - e), t₁t₂ = e² - 50 ➔ CE² + DE² = t₁² + t₂² = 100</text>
  </g>
</svg>
